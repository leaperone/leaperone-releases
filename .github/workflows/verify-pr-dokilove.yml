name: Verify DokiLove and NIMEI release

on:
  pull_request:
    paths:
      - ".github/workflows/deploy-de.yml"
      - ".github/workflows/deploy-dokilove.yml"
      - ".github/workflows/verify-pr-dokilove.yml"
      - "compose/dokilove/**"
      - "compose/nimei/**"
      - "ops/dokilove/**"
      - "scripts/deploy.sh"

permissions:
  contents: read

concurrency:
  group: verify-dokilove-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run release contract tests
        run: bash ops/dokilove/test-release-contracts.sh

      - name: Check Shell syntax
        run: |
          bash -n \
            compose/dokilove/preflight.sh \
            compose/nimei/deploy-bluegreen.sh \
            compose/nimei/install-nginx.sh \
            compose/nimei/preflight.sh \
            ops/dokilove/test-release-contracts.sh \
            scripts/deploy.sh

      - name: Install pinned linters
        env:
          ACTIONLINT_VERSION: 1.7.12
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes shellcheck
          mkdir -p "$RUNNER_TEMP/actionlint"
          cd "$RUNNER_TEMP/actionlint"
          archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          base="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}"
          curl --fail --silent --show-error --location --output "$archive" "$base/$archive"
          curl --fail --silent --show-error --location --output checksums.txt \
            "$base/actionlint_${ACTIONLINT_VERSION}_checksums.txt"
          grep "  $archive\$" checksums.txt | sha256sum --check --strict
          tar -xzf "$archive" actionlint
          echo "$RUNNER_TEMP/actionlint" >> "$GITHUB_PATH"

      - name: Lint workflows
        run: |
          actionlint \
            .github/workflows/deploy-de.yml \
            .github/workflows/deploy-dokilove.yml \
            .github/workflows/verify-pr-dokilove.yml

      - name: Lint Shell scripts
        run: |
          shellcheck --severity=warning \
            compose/dokilove/preflight.sh \
            compose/nimei/deploy-bluegreen.sh \
            compose/nimei/install-nginx.sh \
            compose/nimei/preflight.sh \
            ops/dokilove/test-release-contracts.sh \
            scripts/deploy.sh

      - name: Validate NIMEI Nginx syntax
        run: |
          set -euo pipefail
          fixture="$RUNNER_TEMP/nimei-nginx"
          mkdir -p "$fixture/ssl/nimei.app" "$fixture/snippets"
          openssl req -x509 -nodes -newkey rsa:2048 -days 1 \
            -keyout "$fixture/ssl/nimei.app/nimei.app.key" \
            -out "$fixture/ssl/nimei.app/fullchain.cer" \
            -subj "/CN=nimei.app" \
            -addext "subjectAltName=DNS:nimei.app,DNS:www.nimei.app" \
            >/dev/null 2>&1
          : > "$fixture/snippets/cloudflare-real-ip.conf"
          docker run --rm \
            -v "$PWD/compose/nimei/nginx/nimei-local.conf:/etc/nginx/conf.d/default.conf:ro" \
            -v "$fixture/ssl:/etc/nginx/ssl:ro" \
            -v "$fixture/snippets:/etc/nginx/snippets:ro" \
            nginx:1.28-alpine nginx -t

      - name: Exercise NIMEI canonical redirects and upstream
        run: |
          set -euo pipefail
          fixture="$RUNNER_TEMP/nimei-nginx-routing"
          mkdir -p "$fixture/ssl/nimei.app" "$fixture/snippets"
          openssl req -x509 -nodes -newkey rsa:2048 -days 1 \
            -keyout "$fixture/ssl/nimei.app/nimei.app.key" \
            -out "$fixture/ssl/nimei.app/fullchain.cer" \
            -subj "/CN=nimei.app" \
            -addext "subjectAltName=DNS:nimei.app,DNS:www.nimei.app" \
            >/dev/null 2>&1
          : > "$fixture/snippets/cloudflare-real-ip.conf"
          printf '%s\n' \
            'server { listen 9811; location / { return 200 "nimei-ready"; } }' \
            > "$fixture/mock-upstream.conf"
          docker run --rm -d --name nimei-nginx-routing-test \
            -p 127.0.0.1:18080:80 \
            -p 127.0.0.1:18443:443 \
            -v "$PWD/compose/nimei/nginx/nimei-local.conf:/etc/nginx/conf.d/default.conf:ro" \
            -v "$fixture/mock-upstream.conf:/etc/nginx/conf.d/mock-upstream.conf:ro" \
            -v "$fixture/ssl:/etc/nginx/ssl:ro" \
            -v "$fixture/snippets:/etc/nginx/snippets:ro" \
            nginx:1.28-alpine >/dev/null
          trap 'docker stop nimei-nginx-routing-test >/dev/null 2>&1 || true' EXIT

          for attempt in $(seq 1 20); do
            if curl --noproxy '*' --insecure --fail --silent --show-error \
              --resolve nimei.app:18443:127.0.0.1 \
              https://nimei.app:18443/api/ready >/dev/null 2>&1; then
              break
            fi
            [ "$attempt" -lt 20 ] || { docker logs nimei-nginx-routing-test; exit 1; }
            sleep 1
          done

          http_redirect="$(curl --noproxy '*' --silent --show-error -o /dev/null \
            -w '%{http_code} %{redirect_url}' --resolve nimei.app:18080:127.0.0.1 \
            'http://nimei.app:18080/summon/42?from=test')"
          [ "$http_redirect" = '301 https://nimei.app/summon/42?from=test' ]

          www_redirect="$(curl --noproxy '*' --insecure --silent --show-error -o /dev/null \
            -w '%{http_code} %{redirect_url}' --resolve www.nimei.app:18443:127.0.0.1 \
            'https://www.nimei.app:18443/dashboard?from=test')"
          [ "$www_redirect" = '301 https://nimei.app/dashboard?from=test' ]

          body="$(curl --noproxy '*' --insecure --fail --silent --show-error \
            --resolve nimei.app:18443:127.0.0.1 https://nimei.app:18443/api/ready)"
          [ "$body" = 'nimei-ready' ]
