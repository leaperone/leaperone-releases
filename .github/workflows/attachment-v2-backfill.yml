name: Attachment v2 Backfill

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "2SOMEone ref to run; main or web-v* tag"
        required: false
        default: "main"
      action:
        description: "Action to run"
        required: true
        type: choice
        options:
          - dry-run
          - verify
          - strict-verify
          - apply-db-only
          - apply-user-media
        default: dry-run
      only:
        description: "apply scope; dry-run/verify leave empty"
        required: false
        default: ""
      limit:
        description: "batch size per step"
        required: false
        default: "1000"
      old_clients_retired:
        description: "strict-verify only: old-client retirement evidence is attached"
        required: false
        type: boolean
        default: false
      email_worker_v2_confirmed:
        description: "strict-verify only: LEAPERone email worker v2 metadata is confirmed"
        required: false
        type: boolean
        default: false
      confirm_production_backfill:
        description: "apply actions require ATTACHMENT_V2_BACKFILL"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: attachment-v2-backfill-production
  cancel-in-progress: false

jobs:
  attachment-v2-backfill:
    name: Attachment v2 ${{ inputs.action }}
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_ENV: production
      TWOSOMEREN_DATABASE_URL: ${{ secrets.TWOSOMEREN_DATABASE_URL }}
      BITIFUL_OSS_ENDPOINT: ${{ secrets.BITIFUL_OSS_ENDPOINT || 'https://s3.bitiful.net' }}
      BITIFUL_OSS_ACCESS_KEY: ${{ secrets.BITIFUL_OSS_ACCESS_KEY }}
      BITIFUL_OSS_SECRET_KEY: ${{ secrets.BITIFUL_OSS_SECRET_KEY }}
      BITIFUL_OSS_PRIVATE_BUCKET_NAME: ${{ secrets.BITIFUL_OSS_PRIVATE_BUCKET_NAME }}
      BITIFUL_OSS_PRIVATE_PUBLIC_BASE_URL: ${{ secrets.BITIFUL_OSS_PRIVATE_PUBLIC_BASE_URL }}
      BITIFUL_OSS_CDN_URL: ${{ secrets.BITIFUL_OSS_CDN_URL }}
    steps:
      - name: Validate inputs
        env:
          SOURCE_REF: ${{ inputs.source_ref }}
          ACTION: ${{ inputs.action }}
          ONLY: ${{ inputs.only }}
          LIMIT: ${{ inputs.limit }}
          CONFIRM: ${{ inputs.confirm_production_backfill }}
          OLD_CLIENTS_RETIRED: ${{ inputs.old_clients_retired }}
          EMAIL_WORKER_V2_CONFIRMED: ${{ inputs.email_worker_v2_confirmed }}
        run: |
          set -euo pipefail

          if [[ "$SOURCE_REF" != "main" && ! "$SOURCE_REF" =~ ^web-v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::source_ref must be main or a web-v* tag"
            exit 1
          fi

          if [[ ! "$LIMIT" =~ ^[0-9]+$ ]] || [ "$LIMIT" -lt 1 ] || [ "$LIMIT" -gt 50000 ]; then
            echo "::error::limit must be an integer between 1 and 50000"
            exit 1
          fi

          case "$ACTION" in
            dry-run|verify|strict-verify)
              if [ -n "$CONFIRM" ]; then
                echo "::warning::confirm_production_backfill is ignored for read-only actions"
              fi
              ;;
            apply-db-only|apply-user-media)
              if [ "$CONFIRM" != "ATTACHMENT_V2_BACKFILL" ]; then
                echo "::error::apply actions require confirm_production_backfill=ATTACHMENT_V2_BACKFILL"
                exit 1
              fi
              ;;
            *)
              echo "::error::unknown action: $ACTION"
              exit 1
              ;;
          esac

          if [ "$ACTION" = "apply-db-only" ]; then
            scope="${ONLY:-legacy-chat,legacy-bubble,legacy-letter,chat-sticker,chat-voice}"
            if echo ",$scope," | grep -Eq ',(user-avatar|user-background),'; then
              echo "::error::apply-db-only cannot include user-avatar/user-background"
              exit 1
            fi
          fi

          if [ "$ACTION" = "apply-user-media" ]; then
            scope="${ONLY:-user-avatar,user-background}"
            if ! echo "$scope" | grep -Eq '^(user-avatar|user-background)(,(user-avatar|user-background))*$'; then
              echo "::error::apply-user-media can only include user-avatar,user-background"
              exit 1
            fi
          fi

          if [ "$ACTION" = "strict-verify" ] && [ "$OLD_CLIENTS_RETIRED" != "true" ]; then
            echo "::error::strict-verify requires old_clients_retired=true and attached rollout evidence"
            exit 1
          fi

          if [ "$ACTION" = "strict-verify" ] && [ "$EMAIL_WORKER_V2_CONFIRMED" != "true" ]; then
            echo "::error::strict-verify requires email_worker_v2_confirmed=true"
            exit 1
          fi

      - name: Checkout 2SOMEone
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          repository: leaperone/2SOMEone
          ref: ${{ inputs.source_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@11.5.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run attachment v2 command
        env:
          ACTION: ${{ inputs.action }}
          ONLY: ${{ inputs.only }}
          LIMIT: ${{ inputs.limit }}
        run: |
          set -euo pipefail
          mkdir -p attachment-v2-evidence

          run_json() {
            local name="$1"
            shift
            echo "::group::$name"
            (cd apps/web && "$@") | tee "attachment-v2-evidence/${name}.json"
            echo "::endgroup::"
          }

          backfill=(node --import tsx scripts/data-migrations/2026-06-08-backfill-attachments-v2.ts)
          verify=(node --import tsx scripts/verify-attachments-v2-readiness.ts)

          case "$ACTION" in
            dry-run)
              run_json backfill-dry-run "${backfill[@]}" --json
              run_json verifier "${verify[@]}" --json
              ;;
            verify)
              run_json verifier "${verify[@]}" --json
              ;;
            strict-verify)
              args=(--strict --json --old-clients-retired --email-worker-v2-confirmed)
              run_json verifier-strict "${verify[@]}" "${args[@]}"
              ;;
            apply-db-only)
              scope="${ONLY:-legacy-chat,legacy-bubble,legacy-letter,chat-sticker,chat-voice}"
              run_json apply-db-only "${backfill[@]}" --execute --only="$scope" --limit="$LIMIT" --json
              run_json backfill-post-apply "${backfill[@]}" --json
              run_json verifier-post-apply "${verify[@]}" --json
              ;;
            apply-user-media)
              scope="${ONLY:-user-avatar,user-background}"
              run_json apply-user-media "${backfill[@]}" --execute --only="$scope" --copy-user-media --limit="$LIMIT" --json
              run_json backfill-post-apply "${backfill[@]}" --json
              run_json verifier-post-apply "${verify[@]}" --json
              ;;
          esac

      - name: Upload attachment v2 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: attachment-v2-${{ inputs.action }}-${{ github.run_id }}
          path: attachment-v2-evidence/*.json
          if-no-files-found: ignore
