name: Deploy DokiLove

on:
  repository_dispatch:
    types: [deploy-dokilove]

jobs:
  resolve-context:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      is_deployable: ${{ steps.resolve.outputs.is_deployable }}
      deploy_hk: ${{ steps.resolve.outputs.deploy_hk }}
      deploy_pve: ${{ steps.resolve.outputs.deploy_pve }}
      build_web: ${{ steps.resolve.outputs.build_web }}
      build_worker: ${{ steps.resolve.outputs.build_worker }}
      build_tgbot: ${{ steps.resolve.outputs.build_tgbot }}
    steps:
      - name: Resolve deploy context
        id: resolve
        run: |
          REF="${{ github.event.client_payload.ref }}"
          TARGETS="${{ github.event.client_payload.targets }}"
          BUILD_TARGETS="${{ github.event.client_payload.build_targets }}"

          PR_NUMBER=""
          IS_DEPLOYABLE="true"

          if [ -z "$TARGETS" ]; then
            TARGETS="hk,pve"
          fi

          DEPLOY_HK="false"
          DEPLOY_PVE="false"

          if [[ "$TARGETS" == *"hk"* ]]; then
            DEPLOY_HK="true"
          fi

          if [[ "$TARGETS" == *"pve"* ]]; then
            DEPLOY_PVE="true"
          fi

          if [ -z "$BUILD_TARGETS" ]; then
            BUILD_TARGETS="web,worker,tg-bot"
          fi

          BUILD_WEB="false"
          BUILD_WORKER="false"
          BUILD_TGBOT="false"

          if [[ "$BUILD_TARGETS" == *"web"* ]]; then
            BUILD_WEB="true"
          fi

          if [[ "$BUILD_TARGETS" == *"worker"* ]]; then
            BUILD_WORKER="true"
          fi

          if [[ "$BUILD_TARGETS" == *"tg-bot"* ]]; then
            BUILD_TGBOT="true"
          fi

          if [ "$DEPLOY_HK" = "false" ] && [ "$DEPLOY_PVE" = "false" ]; then
            IS_DEPLOYABLE="false"
            echo "No valid deploy targets resolved from: $TARGETS"
          fi

          if [ -z "$REF" ]; then
            RESOLVED_REF="main"
            echo "使用默认分支: main (ref 为空)"
          elif [[ "$REF" == "main" ]] || [[ "$REF" == "refs/heads/main" ]]; then
            RESOLVED_REF="$REF"
            echo "使用 main 分支: $REF"
          elif [[ "$REF" =~ ^([0-9]+)/merge ]]; then
            PR_NUMBER="${BASH_REMATCH[1]}"
            RESOLVED_REF="refs/pull/${PR_NUMBER}/merge"
            IS_DEPLOYABLE="false"
            echo "检测到 PR merge ref，使用 PR #${PR_NUMBER} 的 merge ref"
          elif [[ "$REF" == *"/merge"* ]]; then
            PR_NUMBER=$(printf '%s' "$REF" | grep -oE '[0-9]+' | head -1)
            if [ -n "$PR_NUMBER" ]; then
              RESOLVED_REF="refs/pull/${PR_NUMBER}/merge"
              IS_DEPLOYABLE="false"
              echo "检测到 merge ref，使用 PR #${PR_NUMBER} 的 merge ref"
            else
              RESOLVED_REF="main"
              echo "无法提取 PR 号，使用默认分支: main (原始 ref: $REF)"
            fi
          elif [[ "$REF" =~ ^(web-|worker-)?v[0-9]+\.[0-9]+\.[0-9]+ ]] || [[ "$REF" =~ ^refs/tags/ ]]; then
            RESOLVED_REF="$REF"
            echo "检测到 tag: $REF，将执行部署"
          else
            RESOLVED_REF="$REF"
            IS_DEPLOYABLE="false"
            echo "非生产部署 ref，不执行部署: $REF"
          fi

          echo "ref=$RESOLVED_REF" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "is_deployable=$IS_DEPLOYABLE" >> "$GITHUB_OUTPUT"
          echo "deploy_hk=$DEPLOY_HK" >> "$GITHUB_OUTPUT"
          echo "deploy_pve=$DEPLOY_PVE" >> "$GITHUB_OUTPUT"
          echo "build_web=$BUILD_WEB" >> "$GITHUB_OUTPUT"
          echo "build_worker=$BUILD_WORKER" >> "$GITHUB_OUTPUT"
          echo "build_tgbot=$BUILD_TGBOT" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: resolve-context
    if: needs.resolve-context.outputs.is_deployable == 'true'
    runs-on: ubuntu-latest
    outputs:
      app_sha: ${{ steps.app-sha.outputs.sha }}
      sentry_release: ${{ steps.sentry.outputs.release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          repository: leaperone/DokiLove
          ref: ${{ needs.resolve-context.outputs.ref }}

      - name: Check Skip CI
        run: |
          if grep -q "noci" <<< "${{ github.event.client_payload.message || '' }}"; then
            echo "跳过构建: commit message 包含 'noci'"
            exit 78
          fi

      - name: Setup docker-compose
        uses: KengoTODA/actions-setup-docker-compose@v1
        with:
          version: '2.14.2'

      - name: Compute app SHA
        id: app-sha
        run: echo "sha=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - name: Compute Sentry release
        id: sentry
        if: needs.resolve-context.outputs.build_web == 'true'
        run: echo "release=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Validate Sentry auth token & DSN
        if: needs.resolve-context.outputs.build_web == 'true'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          NEXT_PUBLIC_SENTRY_DSN: https://ad95f8e28d800b13f55fa2e67e302cb9@sentry.leaper.one/7
        run: |
          test -n "$SENTRY_AUTH_TOKEN" || { echo "SENTRY_AUTH_TOKEN required"; exit 1; }
          if [[ "$NEXT_PUBLIC_SENTRY_DSN" == *"__DSN_PLACEHOLDER__"* ]]; then
            echo "NEXT_PUBLIC_SENTRY_DSN still contains __DSN_PLACEHOLDER__"
            exit 1
          fi

      - name: Build Docker images
        env:
          NEXT_PUBLIC_SENTRY_DSN: https://ad95f8e28d800b13f55fa2e67e302cb9@sentry.leaper.one/7
          NEXT_PUBLIC_SENTRY_ENVIRONMENT: production
          SENTRY_URL: https://sentry.leaper.one
          SENTRY_ORG: leaperone
          SENTRY_PROJECT: dokilove-web
          SENTRY_RELEASE: dokilove-web@${{ steps.sentry.outputs.release }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          BUILD_SERVICES=""
          if [ "${{ needs.resolve-context.outputs.build_web }}" = "true" ]; then
            BUILD_SERVICES="$BUILD_SERVICES dokilove-web"
          fi
          if [ "${{ needs.resolve-context.outputs.build_worker }}" = "true" ]; then
            BUILD_SERVICES="$BUILD_SERVICES dokilove-worker"
          fi
          if [ "${{ needs.resolve-context.outputs.build_tgbot }}" = "true" ]; then
            BUILD_SERVICES="$BUILD_SERVICES dokilove-tg-bot"
          fi
          if [ -z "${BUILD_SERVICES// }" ]; then
            echo "No build services selected"
            exit 0
          fi
          echo "Building services:$BUILD_SERVICES"
          docker compose -f ./docker/docker-compose-build.yml build $BUILD_SERVICES

      - name: Extract sourcemaps from builder
        if: needs.resolve-context.outputs.build_web == 'true'
        env:
          NEXT_PUBLIC_SENTRY_DSN: https://ad95f8e28d800b13f55fa2e67e302cb9@sentry.leaper.one/7
          NEXT_PUBLIC_SENTRY_ENVIRONMENT: production
          SENTRY_RELEASE: dokilove-web@${{ steps.sentry.outputs.release }}
        run: |
          DOCKER_BUILDKIT=1 docker build -f ./docker/Dockerfile --target sourcemaps \
            --build-arg NEXT_PUBLIC_SENTRY_DSN="$NEXT_PUBLIC_SENTRY_DSN" \
            --build-arg NEXT_PUBLIC_SENTRY_ENVIRONMENT="$NEXT_PUBLIC_SENTRY_ENVIRONMENT" \
            --build-arg SENTRY_RELEASE="$SENTRY_RELEASE" \
            --progress=plain --output type=local,dest=$RUNNER_TEMP/sourcemaps .

      - name: Pack sourcemaps
        if: needs.resolve-context.outputs.build_web == 'true'
        run: tar -cf $RUNNER_TEMP/sourcemaps.tar -C $RUNNER_TEMP/sourcemaps .

      - name: Upload sourcemaps artifact
        if: needs.resolve-context.outputs.build_web == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dokilove-web-sourcemaps-${{ steps.app-sha.outputs.sha }}
          path: ${{ runner.temp }}/sourcemaps.tar
          retention-days: 1
          if-no-files-found: error

      - name: Login to Aliyun Docker Registry (Hong Kong)
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hongkong.aliyuncs.com
          username: ${{ secrets.ALIYUN_DOCKER_USERNAME }}
          password: ${{ secrets.ALIYUN_DOCKER_PASSWORD }}

      - name: Login to Aliyun Docker Registry (Shanghai)
        uses: docker/login-action@v3
        with:
          registry: registry.cn-shanghai.aliyuncs.com
          username: ${{ secrets.ALIYUN_DOCKER_USERNAME }}
          password: ${{ secrets.ALIYUN_DOCKER_PASSWORD }}

      - name: Push Docker images to both registries
        run: |
          HK_REGISTRY="registry.cn-hongkong.aliyuncs.com/leaperone/dokilove"
          SH_REGISTRY="registry.cn-shanghai.aliyuncs.com/leaperone/dokilove"

          push_image() {
            local tag="$1"
            local hk_image="$HK_REGISTRY:$tag"
            local sh_image="$SH_REGISTRY:$tag"
            docker tag "$hk_image" "$sh_image"
            docker push "$sh_image"
            docker push "$hk_image"
          }

          if [ "${{ needs.resolve-context.outputs.build_web }}" = "true" ]; then
            echo "Pushing web image..."
            push_image "latest"
          fi

          if [ "${{ needs.resolve-context.outputs.build_worker }}" = "true" ]; then
            echo "Pushing worker image..."
            push_image "worker-latest"
          fi

          if [ "${{ needs.resolve-context.outputs.build_tgbot }}" = "true" ]; then
            echo "Pushing tg-bot image..."
            push_image "tg-bot-latest"
          fi

  upload-sourcemaps:
    needs: [resolve-context, build-and-push]
    if: needs.resolve-context.outputs.is_deployable == 'true' && needs.resolve-context.outputs.build_web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Download sourcemaps
        uses: actions/download-artifact@v4
        with:
          name: dokilove-web-sourcemaps-${{ needs.build-and-push.outputs.app_sha }}
          path: ./sm-artifact

      - name: Unpack
        run: mkdir -p ./sourcemaps && tar -xf ./sm-artifact/sourcemaps.tar -C ./sourcemaps

      - name: Upload to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_URL: https://sentry.leaper.one
          SENTRY_ORG: leaperone
          SENTRY_PROJECT: dokilove-web
          SENTRY_RELEASE: dokilove-web@${{ needs.build-and-push.outputs.sentry_release }}
        run: |
          pnpm dlx @sentry/cli@2.58.5 releases new "$SENTRY_RELEASE"
          pnpm dlx @sentry/cli@2.58.5 sourcemaps upload --release "$SENTRY_RELEASE" ./sourcemaps
          pnpm dlx @sentry/cli@2.58.5 releases finalize "$SENTRY_RELEASE"

  migrate-production:
    needs: [resolve-context, build-and-push]
    if: needs.resolve-context.outputs.is_deployable == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          repository: leaperone/DokiLove
          ref: ${{ needs.resolve-context.outputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@11.3.0 --activate

      - name: Run Database Migrations
        run: |
          pnpm install --filter @dokilove/web
          DATABASE_URL="${{ secrets.DOKILOVE_DATABASE_URL }}" pnpm --filter @dokilove/web db:migrate

  deploy-pve-web:
    needs: [resolve-context, migrate-production]
    if: needs.resolve-context.outputs.is_deployable == 'true' && needs.resolve-context.outputs.deploy_pve == 'true' && needs.resolve-context.outputs.build_web == 'true'
    # Serialize with deploy-pve-worker / deploy-pve-tgbot: all three deploy to
    # the same PVE app LXC and pull layer-sharing images; concurrent
    # `docker compose pull` races the containerd overlayfs snapshotter
    # ("failed to extract layer ... link ...").
    concurrency:
      group: dokilove-pve-deploy
      cancel-in-progress: false
      queue: max
    uses: ./.github/workflows/deploy-pve.yml
    with:
      project: dokilove
      env: production
    secrets: inherit

  deploy-pve-worker:
    needs: [resolve-context, migrate-production]
    if: needs.resolve-context.outputs.is_deployable == 'true' && needs.resolve-context.outputs.deploy_pve == 'true' && needs.resolve-context.outputs.build_worker == 'true'
    concurrency:
      group: dokilove-pve-deploy
      cancel-in-progress: false
      queue: max
    uses: ./.github/workflows/deploy-pve.yml
    with:
      project: dokilove-worker
      env: production
    secrets: inherit

  deploy-pve-tgbot:
    needs: [resolve-context, migrate-production]
    if: needs.resolve-context.outputs.is_deployable == 'true' && needs.resolve-context.outputs.deploy_pve == 'true' && needs.resolve-context.outputs.build_tgbot == 'true'
    concurrency:
      group: dokilove-pve-deploy
      cancel-in-progress: false
      queue: max
    uses: ./.github/workflows/deploy-pve.yml
    with:
      project: dokilove-tg-bot
      env: production
    secrets: inherit
