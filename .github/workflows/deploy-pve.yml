name: Deploy to PVE

on:
  workflow_call:
    inputs:
      project:
        required: true
        type: string
        description: "Project name matching compose/<project>/"
      env:
        required: true
        type: string
        description: "Deploy environment (production / beta)"
      internal:
        required: false
        type: boolean
        default: false
        description: 'When true, use PVE_APP_HOST_INTERNAL/PVE_APP_PORT_INTERNAL secrets (PVE LAN). When false (default), use PVE_APP_HOST/PVE_APP_PORT (public).'
      image_source_sha:
        required: false
        type: string
        default: ""
        description: "Optional full source SHA for an immutable deployment"
      image_ref:
        required: false
        type: string
        default: ""
        description: "Expected immutable registry image reference"
      image_digest:
        required: false
        type: string
        default: ""
        description: "Expected registry manifest digest"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deployment configs
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Sync run-scoped deploy entrypoint to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ inputs.internal && secrets.PVE_APP_HOST_INTERNAL || secrets.PVE_APP_HOST }}
          username: ${{ secrets.PVE_APP_USERNAME }}
          key: ${{ secrets.PVE_APP_SSH_KEY }}
          port: ${{ inputs.internal && secrets.PVE_APP_PORT_INTERNAL || secrets.PVE_APP_PORT }}
          source: "scripts/deploy.sh"
          target: "${{ secrets.APP_DEPLOY_ROOT }}/${{ inputs.project }}/${{ inputs.env }}/.release-tools/${{ github.run_id }}-${{ github.run_attempt }}"
          strip_components: 1
          overwrite: true

      - name: Sync compose directory to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ inputs.internal && secrets.PVE_APP_HOST_INTERNAL || secrets.PVE_APP_HOST }}
          username: ${{ secrets.PVE_APP_USERNAME }}
          key: ${{ secrets.PVE_APP_SSH_KEY }}
          port: ${{ inputs.internal && secrets.PVE_APP_PORT_INTERNAL || secrets.PVE_APP_PORT }}
          source: "compose/${{ inputs.project }}/*"
          target: "${{ secrets.APP_DEPLOY_ROOT }}/${{ inputs.project }}/${{ inputs.env }}"
          strip_components: 2
          overwrite: true

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.0
        env:
          APP_DEPLOY_ROOT: ${{ secrets.APP_DEPLOY_ROOT }}
          DEPLOY_STATE_ROOT: ${{ secrets.DEPLOY_STATE_ROOT }}
          IMAGE_SOURCE_SHA: ${{ inputs.image_source_sha }}
          IMAGE_REF: ${{ inputs.image_ref }}
          IMAGE_DIGEST: ${{ inputs.image_digest }}
          RELEASES_SHA: ${{ github.sha }}
          ALIYUN_DOCKER_USERNAME: ${{ inputs.project == 'leaperone-www-cn' && secrets.ALIYUN_DOCKER_USERNAME || '' }}
          ALIYUN_DOCKER_PASSWORD: ${{ inputs.project == 'leaperone-www-cn' && secrets.ALIYUN_DOCKER_PASSWORD || '' }}
        with:
          host: ${{ inputs.internal && secrets.PVE_APP_HOST_INTERNAL || secrets.PVE_APP_HOST }}
          username: ${{ secrets.PVE_APP_USERNAME }}
          key: ${{ secrets.PVE_APP_SSH_KEY }}
          port: ${{ inputs.internal && secrets.PVE_APP_PORT_INTERNAL || secrets.PVE_APP_PORT }}
          command_timeout: 20m
          envs: APP_DEPLOY_ROOT,DEPLOY_STATE_ROOT,IMAGE_SOURCE_SHA,IMAGE_REF,IMAGE_DIGEST,RELEASES_SHA,ALIYUN_DOCKER_USERNAME,ALIYUN_DOCKER_PASSWORD
          script: |
            set -euo pipefail
            PROJECT="${{ inputs.project }}"
            DEPLOY_ENV="${{ inputs.env }}"
            case "$PROJECT" in ""|*[!a-z0-9_-]*) echo "ERROR: invalid project" >&2; exit 1;; esac
            case "$DEPLOY_ENV" in ""|*[!a-z0-9_-]*) echo "ERROR: invalid environment" >&2; exit 1;; esac

            TOOL_DIR="${APP_DEPLOY_ROOT}/${PROJECT}/${DEPLOY_ENV}/.release-tools/${{ github.run_id }}-${{ github.run_attempt }}"
            ENV_TMP=
            cleanup() {
              [ -z "$ENV_TMP" ] || rm -f -- "$ENV_TMP"
              rm -f -- "$TOOL_DIR/deploy.sh"
              rmdir -- "$TOOL_DIR" 2>/dev/null || true
            }
            trap cleanup EXIT

            case "$PROJECT:$DEPLOY_ENV" in
              leaperone-www-cn:production)
                [[ "$IMAGE_SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]] || {
                  echo "ERROR: CN deploy requires a full lowercase source SHA" >&2
                  exit 1
                }
                [[ "$IMAGE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]] || {
                  echo "ERROR: CN deploy requires an exact registry digest" >&2
                  exit 1
                }
                [[ "$RELEASES_SHA" =~ ^[0-9a-f]{40}$ ]] || {
                  echo "ERROR: invalid release-automation SHA" >&2
                  exit 1
                }
                EXPECTED_IMAGE_REF="registry.cn-hongkong.aliyuncs.com/leaperone/leaperone:www-cn-${IMAGE_SOURCE_SHA}"
                [ "$IMAGE_REF" = "$EXPECTED_IMAGE_REF" ] || {
                  echo "ERROR: unexpected CN image reference" >&2
                  exit 1
                }
                [[ "$DEPLOY_STATE_ROOT" =~ ^/[A-Za-z0-9._/-]+$ ]] || {
                  echo "ERROR: invalid deployment-state root" >&2
                  exit 1
                }
                APP_ENV_FILE="${APP_DEPLOY_ROOT}/${PROJECT}/${DEPLOY_ENV}/.env"
                [ -f "$APP_ENV_FILE" ] || {
                  echo "ERROR: target .env is missing" >&2
                  exit 1
                }
                umask 077
                ENV_TMP="$(mktemp "${APP_ENV_FILE}.XXXXXX")"
                awk -v value="$DEPLOY_STATE_ROOT" '
                  BEGIN { found = 0 }
                  /^DEPLOY_STATE_ROOT=/ {
                    print "DEPLOY_STATE_ROOT=" value
                    found++
                    next
                  }
                  { print }
                  END { if (found != 1) exit 42 }
                ' "$APP_ENV_FILE" > "$ENV_TMP" || {
                  echo "ERROR: target .env must contain exactly one DEPLOY_STATE_ROOT assignment" >&2
                  exit 1
                }
                chown --reference="$APP_ENV_FILE" "$ENV_TMP"
                chmod 0600 "$ENV_TMP"
                mv -f -- "$ENV_TMP" "$APP_ENV_FILE"
                ENV_TMP=
                [ -n "${ALIYUN_DOCKER_USERNAME:-}" ] || {
                  echo "ERROR: registry username is required" >&2
                  exit 1
                }
                [ -n "${ALIYUN_DOCKER_PASSWORD:-}" ] || {
                  echo "ERROR: registry password is required" >&2
                  exit 1
                }
                printf '%s' "$ALIYUN_DOCKER_PASSWORD" \
                  | docker login registry.cn-hongkong.aliyuncs.com \
                      --username "$ALIYUN_DOCKER_USERNAME" \
                      --password-stdin >/dev/null
                unset ALIYUN_DOCKER_USERNAME ALIYUN_DOCKER_PASSWORD
                export WWW_CN_IMAGE_TAG="www-cn-${IMAGE_SOURCE_SHA}"
                export WWW_CN_IMAGE_DIGEST="$IMAGE_DIGEST"
                export WWW_CN_SOURCE_SHA="$IMAGE_SOURCE_SHA"
                ;;
              *)
                if [ -n "${IMAGE_SOURCE_SHA:-}${IMAGE_REF:-}${IMAGE_DIGEST:-}" ]; then
                  echo "ERROR: immutable image inputs are unsupported for this project" >&2
                  exit 1
                fi
                ;;
            esac

            bash "$TOOL_DIR/deploy.sh" "$PROJECT" "$DEPLOY_ENV"
