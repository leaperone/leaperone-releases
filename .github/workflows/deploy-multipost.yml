name: Deploy MultiPost

on:
  repository_dispatch:
    types: [deploy-multipost]

jobs:
  resolve-context:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      is_deployable: ${{ steps.resolve.outputs.is_deployable }}
      deploy_env: ${{ steps.resolve.outputs.deploy_env }}
      deploy_hk: ${{ steps.resolve.outputs.deploy_hk }}
      deploy_pve: ${{ steps.resolve.outputs.deploy_pve }}
    steps:
      - name: Resolve deploy context
        id: resolve
        run: |
          REF="${{ github.event.client_payload.ref }}"
          ENV_INPUT="${{ github.event.client_payload.env }}"
          TARGETS="${{ github.event.client_payload.targets }}"

          DEPLOY_ENV="production"
          PR_NUMBER=""
          IS_DEPLOYABLE="true"

          if [ -z "$TARGETS" ]; then
            TARGETS="hk,pve"
          fi

          DEPLOY_HK="false"
          DEPLOY_PVE="false"

          if [[ "$TARGETS" == *"hk"* ]]; then
            DEPLOY_HK="true"
          fi

          if [[ "$TARGETS" == *"pve"* ]]; then
            DEPLOY_PVE="true"
          fi

          if [ "$ENV_INPUT" != "" ] && [ "$ENV_INPUT" != "$DEPLOY_ENV" ]; then
            IS_DEPLOYABLE="false"
            echo "Unsupported deploy env: $ENV_INPUT"
          fi

          if [ "$DEPLOY_HK" = "false" ] && [ "$DEPLOY_PVE" = "false" ]; then
            IS_DEPLOYABLE="false"
            echo "No valid deploy targets resolved from: $TARGETS"
          fi

          if [ -z "$REF" ]; then
            RESOLVED_REF="main"
            echo "使用默认分支: main (ref 为空)"
          elif [[ "$REF" == "main" ]] || [[ "$REF" == "refs/heads/main" ]]; then
            RESOLVED_REF="$REF"
            echo "使用 main 分支: $REF"
          elif [[ "$REF" =~ ^([0-9]+)/merge ]]; then
            PR_NUMBER="${BASH_REMATCH[1]}"
            RESOLVED_REF="refs/pull/${PR_NUMBER}/merge"
            IS_DEPLOYABLE="false"
            echo "检测到 PR merge ref，使用 PR #${PR_NUMBER} 的 merge ref"
          elif [[ "$REF" == *"/merge"* ]]; then
            PR_NUMBER=$(printf '%s' "$REF" | grep -oE '[0-9]+' | head -1)
            if [ -n "$PR_NUMBER" ]; then
              RESOLVED_REF="refs/pull/${PR_NUMBER}/merge"
              IS_DEPLOYABLE="false"
              echo "检测到 merge ref，使用 PR #${PR_NUMBER} 的 merge ref"
            else
              RESOLVED_REF="main"
              echo "无法提取 PR 号，使用默认分支: main (原始 ref: $REF)"
            fi
          elif [[ "$REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]] || [[ "$REF" =~ ^refs/tags/ ]]; then
            RESOLVED_REF="$REF"
            echo "检测到 tag: $REF，将执行部署"
          else
            RESOLVED_REF="$REF"
            IS_DEPLOYABLE="false"
            echo "非生产部署 ref，不执行部署: $REF"
          fi

          echo "ref=$RESOLVED_REF" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "is_deployable=$IS_DEPLOYABLE" >> "$GITHUB_OUTPUT"
          echo "deploy_env=$DEPLOY_ENV" >> "$GITHUB_OUTPUT"
          echo "deploy_hk=$DEPLOY_HK" >> "$GITHUB_OUTPUT"
          echo "deploy_pve=$DEPLOY_PVE" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: resolve-context
    if: needs.resolve-context.outputs.is_deployable == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          repository: leaperone/MultiPost
          ref: ${{ needs.resolve-context.outputs.ref }}

      - name: Check Skip CI
        run: |
          if grep -q "noci" <<< "${{ github.event.client_payload.message || '' }}"; then
            echo "跳过构建: commit message 包含 'noci'"
            exit 78
          fi

      - name: Setup docker-compose
        uses: KengoTODA/actions-setup-docker-compose@v1
        with:
          version: '2.14.2'

      - name: Build Docker images
        env:
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_MULTIPOST_ENV_ID: ${{ secrets.POSTHOG_MULTIPOST_ENV_ID }}
          NEXT_PUBLIC_POSTHOG_HOST: https://us.posthog.com
        run: docker compose -f ./docker/docker-compose-build.yml build

      - name: Login to Aliyun Docker Registry (Shanghai)
        uses: docker/login-action@v3
        with:
          registry: registry.cn-shanghai.aliyuncs.com
          username: ${{ secrets.ALIYUN_DOCKER_USERNAME }}
          password: ${{ secrets.ALIYUN_DOCKER_PASSWORD }}

      - name: Login to Aliyun Docker Registry (Hong Kong)
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hongkong.aliyuncs.com
          username: ${{ secrets.ALIYUN_DOCKER_USERNAME }}
          password: ${{ secrets.ALIYUN_DOCKER_PASSWORD }}

      - name: Push Docker images to both registries
        run: |
          WEB_HK_IMAGE="registry.cn-hongkong.aliyuncs.com/leaperone/multipost:latest"
          BACKEND_HK_IMAGE="registry.cn-hongkong.aliyuncs.com/leaperone/multipost:backend-latest"
          VIDEO_STT_HK_IMAGE="registry.cn-hongkong.aliyuncs.com/leaperone/multipost:video-stt-worker-latest"

          WEB_SH_IMAGE="registry.cn-shanghai.aliyuncs.com/leaperone/multipost:latest"
          BACKEND_SH_IMAGE="registry.cn-shanghai.aliyuncs.com/leaperone/multipost:backend-latest"
          VIDEO_STT_SH_IMAGE="registry.cn-shanghai.aliyuncs.com/leaperone/multipost:video-stt-worker-latest"

          docker tag "$WEB_HK_IMAGE" "$WEB_SH_IMAGE"
          docker tag "$BACKEND_HK_IMAGE" "$BACKEND_SH_IMAGE"
          docker tag "$VIDEO_STT_HK_IMAGE" "$VIDEO_STT_SH_IMAGE"

          docker push "$WEB_SH_IMAGE"
          docker push "$BACKEND_SH_IMAGE"
          docker push "$VIDEO_STT_SH_IMAGE"

          docker push "$WEB_HK_IMAGE"
          docker push "$BACKEND_HK_IMAGE"
          docker push "$VIDEO_STT_HK_IMAGE"

  migrate-production:
    needs: [resolve-context, build-and-push]
    if: needs.resolve-context.outputs.is_deployable == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          repository: leaperone/MultiPost
          ref: ${{ needs.resolve-context.outputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Execute migrations
        env:
          MULTIPOST_DATABASE_URL: ${{ secrets.MULTIPOST_DATABASE_URL }}
        run: |
          npm install -g prisma@6.19.0
          sh prisma/migrate_deploy.sh

  deploy-hk:
    needs: [resolve-context, migrate-production]
    if: needs.resolve-context.outputs.is_deployable == 'true' && needs.resolve-context.outputs.deploy_hk == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to HK production
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ALIYUN_HK_HOST }}
          username: ${{ secrets.ALIYUN_CN_USERNAME }}
          port: ${{ secrets.ALIYUN_CN_PORT }}
          key: ${{ secrets.ALIYUN_CN_SSH_PRIVATE_KEY }}
          script: ${{ secrets.DEPLOY_MULTIPOST_SCRIPT }}

  deploy-pve:
    needs: [resolve-context, migrate-production]
    if: needs.resolve-context.outputs.is_deployable == 'true' && needs.resolve-context.outputs.deploy_pve == 'true'
    uses: ./.github/workflows/deploy-pve.yml
    with:
      project: multipost
      env: production
    secrets: inherit

  pr-comment:
    needs: [resolve-context, build-and-push, migrate-production, deploy-hk, deploy-pve]
    if: always() && needs.resolve-context.outputs.pr_number != ''
    uses: leaperone/leaperone-releases/.github/workflows/pr-comment.yml@main
    with:
      status: ${{ contains(format('{0},{1},{2},{3}', needs.build-and-push.result, needs.migrate-production.result, needs.deploy-hk.result, needs.deploy-pve.result), 'failure') && 'failure' || contains(format('{0},{1},{2},{3}', needs.build-and-push.result, needs.migrate-production.result, needs.deploy-hk.result, needs.deploy-pve.result), 'cancelled') && 'cancelled' || needs.resolve-context.outputs.is_deployable != 'true' && needs.build-and-push.result || 'success' }}
      ref: leaperone/MultiPost@${{ needs.resolve-context.outputs.ref }}
      run_number: ${{ github.run_number }}
      message: ${{ github.event.client_payload.message }}
      author: ${{ github.event.client_payload.author }}
      run_id: ${{ github.run_id }}
      pr_number: ${{ needs.resolve-context.outputs.pr_number }}
      repository: leaperone/MultiPost
    secrets:
      ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}

  notify:
    needs: [resolve-context, build-and-push, migrate-production, deploy-hk, deploy-pve]
    if: always()
    uses: leaperone/leaperone-releases/.github/workflows/feishu-notification.yml@main
    with:
      status: ${{ contains(format('{0},{1},{2},{3}', needs.build-and-push.result, needs.migrate-production.result, needs.deploy-hk.result, needs.deploy-pve.result), 'failure') && 'failure' || contains(format('{0},{1},{2},{3}', needs.build-and-push.result, needs.migrate-production.result, needs.deploy-hk.result, needs.deploy-pve.result), 'cancelled') && 'cancelled' || needs.resolve-context.outputs.is_deployable != 'true' && needs.build-and-push.result || 'success' }}
      ref: leaperone/MultiPost@${{ needs.resolve-context.outputs.ref }}
      run_number: ${{ github.run_number }}
      message: ${{ github.event.client_payload.message }}
      author: ${{ github.event.client_payload.author }}
      run_id: ${{ github.run_id }}
      repository: leaperone/MultiPost
      pr_number: ${{ needs.resolve-context.outputs.pr_number }}
    secrets:
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
