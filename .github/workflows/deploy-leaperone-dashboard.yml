name: Deploy LEAPERone Dashboard
run-name: >-
  🚀 Deploy LEAPERone Dashboard · @${{ github.event.client_payload.author || github.actor }} [src=${{ github.event.client_payload.source_sha || github.event.client_payload.ref || 'main' }}]

on:
  repository_dispatch:
    types: [deploy-leaperone-dashboard]

concurrency:
  group: deploy-leaperone-dashboard-production
  cancel-in-progress: false

jobs:
  deploy:
    uses: ./.github/workflows/deploy-leaperone-frontend.yml
    with:
      component: dashboard
      project: leaperone-dashboard
      sentry_project: leaperone-dashboard
      sentry_dsn: ${{ vars.LEAPERONE_DASHBOARD_SENTRY_DSN }}
      requested_ref: ${{ github.event.client_payload.ref || 'main' }}
      requested_source_sha: ${{ github.event.client_payload.source_sha || '' }}
    secrets: inherit
