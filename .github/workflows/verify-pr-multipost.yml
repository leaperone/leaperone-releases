name: Verify PR MultiPost
run-name: >-
  🔎 PR Check MultiPost · ${{ github.event.client_payload.message || '' }} · @${{ github.event.client_payload.author || github.actor }} [pr-check][src=${{ github.event.client_payload.source_sha || github.sha }}]

on:
  repository_dispatch:
    types: [verify-pr-multipost]
  workflow_dispatch:
    inputs:
      pr:
        description: 'Pull request number to verify'
        required: false
      ref:
        description: 'Ref to verify (for example refs/pull/123/merge or 123/merge)'
        required: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
    steps:
      - name: Resolve PR ref
        id: resolve
        run: |
          PR_INPUT="${{ inputs.pr || github.event.client_payload.pr || github.event.client_payload.pr_number }}"
          REF="${{ inputs.ref || github.event.client_payload.ref }}"
          PR_NUMBER=""

          if [ -n "$PR_INPUT" ]; then
            if [[ ! "$PR_INPUT" =~ ^[0-9]+$ ]]; then
              echo "ERROR: pr must be a pull request number, got: $PR_INPUT" >&2
              exit 1
            fi
            PR_NUMBER="$PR_INPUT"
            RESOLVED_REF="refs/pull/${PR_NUMBER}/merge"
            echo "使用 PR #${PR_NUMBER} 的 merge ref"
          elif [[ "$REF" =~ ^refs/pull/([0-9]+)/merge$ ]]; then
            PR_NUMBER="${BASH_REMATCH[1]}"
            RESOLVED_REF="$REF"
            echo "检测到 PR merge ref: $REF"
          elif [[ "$REF" =~ ^([0-9]+)/merge$ ]]; then
            PR_NUMBER="${BASH_REMATCH[1]}"
            RESOLVED_REF="refs/pull/${PR_NUMBER}/merge"
            echo "检测到 PR merge ref，使用 PR #${PR_NUMBER} 的 merge ref"
          elif [[ "$REF" == *"/merge"* ]]; then
            PR_NUMBER=$(printf '%s' "$REF" | grep -oE '[0-9]+' | head -1)
            if [ -z "$PR_NUMBER" ]; then
              echo "ERROR: could not extract PR number from ref: $REF" >&2
              exit 1
            fi
            RESOLVED_REF="refs/pull/${PR_NUMBER}/merge"
            echo "检测到 merge ref，使用 PR #${PR_NUMBER} 的 merge ref"
          elif [ -n "$REF" ]; then
            if [[ "$REF" == "main" || "$REF" == "refs/heads/main" || "$REF" =~ ^(web-|worker-)?v[0-9]+\.[0-9]+\.[0-9]+ || "$REF" =~ ^refs/tags/ ]]; then
              echo "ERROR: verify-pr-multipost only verifies non-deploy refs. Got deployable ref: $REF" >&2
              exit 1
            fi
            RESOLVED_REF="$REF"
            echo "使用指定 ref 做 PR 验证: $REF"
          else
            echo "ERROR: provide pr or ref for verify-pr-multipost" >&2
            exit 1
          fi

          echo "ref=$RESOLVED_REF" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

  verify-pr:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          repository: leaperone/MultiPost
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.8.2

      - name: Setup Atlas
        run: |
          curl -fsSL https://release.ariga.io/atlas/atlas-community-linux-amd64-v1.2.2 -o /tmp/atlas
          printf '%s  %s\n' 'a38e34e886cd0b9d2d625fe0046fed107785b1562bd2d07dbd96fadfc57dec62' /tmp/atlas | sha256sum -c -
          chmod +x /tmp/atlas
          sudo mv /tmp/atlas /usr/local/bin/atlas

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate route tree
        run: pnpm --filter multipost-web generate-routes

      - name: Typecheck
        run: pnpm --filter multipost-web exec tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Build Atlas source
        run: pnpm db:build:source

      - name: Atlas migrate lint
        run: atlas migrate lint --env local --config file://db/atlas/atlas.hcl --latest=1

      - name: Atlas no-DML lint
        run: pnpm db:lint:no-dml

      - name: Backend Deno check
        working-directory: apps/backend
        run: deno check main.ts

      - name: Video STT Deno check
        working-directory: apps/video-stt-worker
        run: deno check src/main.ts
