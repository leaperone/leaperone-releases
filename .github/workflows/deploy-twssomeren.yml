name: Deploy TwoSOMEren

on:
  repository_dispatch:
    types: [deploy-twssomeren]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.set-ref.outputs.pr_number }}
      is_deployable: ${{ steps.set-ref.outputs.is_deployable }}
      source_sha: ${{ steps.sentry.outputs.release }}

    steps:
      - name: Validate and set ref
        id: set-ref
        run: |
          REF="${{ github.event.client_payload.ref }}"
          if [ -z "$REF" ]; then
            echo "ref=main" >> $GITHUB_OUTPUT
            echo "pr_number=" >> $GITHUB_OUTPUT
            echo "is_deployable=true" >> $GITHUB_OUTPUT
            echo "使用默认分支: main (ref 为空)"
          elif [[ "$REF" == "main" ]] || [[ "$REF" == "refs/heads/main" ]]; then
            echo "ref=$REF" >> $GITHUB_OUTPUT
            echo "pr_number=" >> $GITHUB_OUTPUT
            echo "is_deployable=true" >> $GITHUB_OUTPUT
            echo "使用 main 分支: $REF"
          elif [[ "$REF" =~ ^([0-9]+)/merge ]]; then
            # 提取 PR 号，使用 PR 的 merge ref
            PR_NUMBER="${BASH_REMATCH[1]}"
            echo "ref=refs/pull/${PR_NUMBER}/merge" >> $GITHUB_OUTPUT
            echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT
            echo "is_deployable=false" >> $GITHUB_OUTPUT
            echo "检测到 PR merge ref，使用 PR #${PR_NUMBER} 的 merge ref"
          elif [[ "$REF" == *"/merge"* ]]; then
            # 其他 merge 格式，尝试提取 PR 号
            PR_NUMBER=$(echo "$REF" | grep -oE '[0-9]+' | head -1)
            if [ -n "$PR_NUMBER" ]; then
              echo "ref=refs/pull/${PR_NUMBER}/merge" >> $GITHUB_OUTPUT
              echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT
              echo "is_deployable=false" >> $GITHUB_OUTPUT
              echo "检测到 merge ref，使用 PR #${PR_NUMBER} 的 merge ref"
            else
              echo "ref=main" >> $GITHUB_OUTPUT
              echo "pr_number=" >> $GITHUB_OUTPUT
              echo "is_deployable=true" >> $GITHUB_OUTPUT
              echo "无法提取 PR 号，使用默认分支: main (原始 ref: $REF)"
            fi
          elif [[ "$REF" =~ ^(web-)?v[0-9]+\.[0-9]+\.[0-9]+ ]] || [[ "$REF" =~ ^refs/tags/ ]]; then
            # Tag 格式，标记为需要部署
            echo "ref=$REF" >> $GITHUB_OUTPUT
            echo "pr_number=" >> $GITHUB_OUTPUT
            echo "is_deployable=true" >> $GITHUB_OUTPUT
            echo "检测到 tag: $REF，将执行部署"
          else
            echo "ref=$REF" >> $GITHUB_OUTPUT
            echo "pr_number=" >> $GITHUB_OUTPUT
            echo "is_deployable=false" >> $GITHUB_OUTPUT
            echo "使用指定 ref: $REF"
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          repository: leaperone/2SOMEone
          ref: ${{ steps.set-ref.outputs.ref }}

      - name: Check Skip CI
        run: |
          if grep -q "noci" <<< "${{ github.event.client_payload.message || '' }}"; then
            echo "跳过构建: commit message 包含 'noci'"
            exit 78
          fi

      - name: Set Sentry release
        id: sentry
        run: echo "release=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Validate Sentry source map env
        if: steps.set-ref.outputs.is_deployable == 'true'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_DSN: ${{ vars.TWOSOMEREN_SENTRY_DSN }}
          POSTHOG_PROJECT_TOKEN: ${{ vars.POSTHOG_2SOMEONE_PROJECT_TOKEN }}
        run: |
          test -n "$SENTRY_AUTH_TOKEN" || {
            echo "SENTRY_AUTH_TOKEN is required for deployable web builds"
            exit 1
          }
          test -n "$SENTRY_DSN" || {
            echo "TWOSOMEREN_SENTRY_DSN is required for deployable web builds"
            exit 1
          }
          if ! [[ "$SENTRY_DSN" =~ ^https://[A-Za-z0-9._-]+@s\.2some\.ren/[0-9]+$ ]]; then
            echo "TWOSOMEREN_SENTRY_DSN must use the 2SOMEren product ingest domain" >&2
            exit 1
          fi
          test -n "$POSTHOG_PROJECT_TOKEN" || {
            echo "POSTHOG_2SOMEONE_PROJECT_TOKEN is required for deployable web builds"
            exit 1
          }

      - name: Setup docker-compose
        uses: KengoTODA/actions-setup-docker-compose@v1
        with:
          version: "2.14.2"

      - name: Build Docker images
        env:
          POSTHOG_PERSONAL_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
          POSTHOG_CLI_PROJECT_ID: ${{ secrets.POSTHOG_2SOMEONE_PROJECT_ID }}
          POSTHOG_2SOMEONE_ENV_ID: ${{ secrets.POSTHOG_2SOMEONE_PROJECT_ID }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ vars.POSTHOG_2SOMEONE_PROJECT_TOKEN }}
          NEXT_PUBLIC_POSTHOG_HOST: https://t.2some.ren
          NEXT_PUBLIC_SENTRY_DSN: ${{ vars.TWOSOMEREN_SENTRY_DSN }}
          SENTRY_URL: ${{ secrets.SENTRY_INTERNAL_URL }}
          SENTRY_ORG: leaperone
          SENTRY_PROJECT: 2someone-web
          SENTRY_ENVIRONMENT: production
          SENTRY_RELEASE: 2someone-web@${{ steps.sentry.outputs.release }}
          SENTRY_AUTH_TOKEN: ${{ steps.set-ref.outputs.is_deployable == 'true' && secrets.SENTRY_AUTH_TOKEN || '' }}
          NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}
        run: docker compose -f apps/web/docker/docker-compose-build.yml build

      - name: Extract exact-build source maps
        if: steps.set-ref.outputs.is_deployable == 'true'
        env:
          POSTHOG_PERSONAL_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
          POSTHOG_CLI_PROJECT_ID: ${{ secrets.POSTHOG_2SOMEONE_PROJECT_ID }}
          POSTHOG_2SOMEONE_ENV_ID: ${{ secrets.POSTHOG_2SOMEONE_PROJECT_ID }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ vars.POSTHOG_2SOMEONE_PROJECT_TOKEN }}
          NEXT_PUBLIC_POSTHOG_HOST: https://t.2some.ren
          NEXT_PUBLIC_SENTRY_DSN: ${{ vars.TWOSOMEREN_SENTRY_DSN }}
          SENTRY_URL: ${{ secrets.SENTRY_INTERNAL_URL }}
          SENTRY_ORG: leaperone
          SENTRY_PROJECT: 2someone-web
          SENTRY_ENVIRONMENT: production
          SENTRY_RELEASE: 2someone-web@${{ steps.sentry.outputs.release }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}
        run: |
          set -euo pipefail
          umask 077
          SENTRY_TOKEN_FILE="$RUNNER_TEMP/sentry-auth-token"
          POSTHOG_TOKEN_FILE="$RUNNER_TEMP/posthog-personal-api-key"
          POSTHOG_PROJECT_FILE="$RUNNER_TEMP/posthog-project-id"
          SERVER_ACTIONS_FILE="$RUNNER_TEMP/next-server-actions-key"
          trap 'rm -f "$SENTRY_TOKEN_FILE" "$POSTHOG_TOKEN_FILE" "$POSTHOG_PROJECT_FILE" "$SERVER_ACTIONS_FILE"' EXIT
          printf '%s' "$SENTRY_AUTH_TOKEN" > "$SENTRY_TOKEN_FILE"
          printf '%s' "$POSTHOG_PERSONAL_API_KEY" > "$POSTHOG_TOKEN_FILE"
          printf '%s' "$POSTHOG_CLI_PROJECT_ID" > "$POSTHOG_PROJECT_FILE"
          printf '%s' "$NEXT_SERVER_ACTIONS_ENCRYPTION_KEY" > "$SERVER_ACTIONS_FILE"
          DOCKER_BUILDKIT=1 docker build \
            -f apps/web/docker/Dockerfile \
            --target sourcemaps \
            --build-arg POSTHOG_2SOMEONE_ENV_ID="$POSTHOG_2SOMEONE_ENV_ID" \
            --build-arg NEXT_PUBLIC_POSTHOG_KEY="$NEXT_PUBLIC_POSTHOG_KEY" \
            --build-arg NEXT_PUBLIC_POSTHOG_HOST="$NEXT_PUBLIC_POSTHOG_HOST" \
            --build-arg NEXT_PUBLIC_SENTRY_DSN="$NEXT_PUBLIC_SENTRY_DSN" \
            --build-arg SENTRY_URL="$SENTRY_URL" \
            --build-arg SENTRY_ORG="$SENTRY_ORG" \
            --build-arg SENTRY_PROJECT="$SENTRY_PROJECT" \
            --build-arg SENTRY_ENVIRONMENT="$SENTRY_ENVIRONMENT" \
            --build-arg SENTRY_RELEASE="$SENTRY_RELEASE" \
            --secret id=sentry_auth_token,src="$SENTRY_TOKEN_FILE" \
            --secret id=posthog_personal_api_key,src="$POSTHOG_TOKEN_FILE" \
            --secret id=posthog_cli_project_id,src="$POSTHOG_PROJECT_FILE" \
            --secret id=next_server_actions_encryption_key,src="$SERVER_ACTIONS_FILE" \
            --output type=local,dest="$RUNNER_TEMP/sourcemaps" \
            .

      - name: Pack exact-build source maps
        if: steps.set-ref.outputs.is_deployable == 'true'
        run: tar -cf "$RUNNER_TEMP/sourcemaps.tar" -C "$RUNNER_TEMP/sourcemaps/next" .

      - name: Checkout source map transport
        if: steps.set-ref.outputs.is_deployable == 'true'
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          path: .release-automation
          persist-credentials: false

      - name: Stage exact-build source maps on PVE
        if: steps.set-ref.outputs.is_deployable == 'true'
        env:
          SOURCEMAP_SPOOL_HOST: ${{ secrets.PVE_APP_HOST }}
          SOURCEMAP_SPOOL_PORT: ${{ secrets.PVE_APP_PORT }}
          SOURCEMAP_SPOOL_USERNAME: ${{ secrets.PVE_APP_USERNAME }}
          SOURCEMAP_SPOOL_SSH_KEY: ${{ secrets.PVE_APP_SSH_KEY }}
          SOURCEMAP_SPOOL_ROOT: ${{ secrets.SOURCEMAP_SPOOL_ROOT }}
          BUNDLE_KEY: twosomeren/${{ github.run_id }}-${{ github.run_attempt }}-${{ steps.sentry.outputs.release }}.tar
        run: .release-automation/scripts/stage-sourcemap-bundle.sh "$RUNNER_TEMP/sourcemaps.tar" "$BUNDLE_KEY"

      - name: Login to Aliyun Docker Registry (Shanghai)
        if: steps.set-ref.outputs.is_deployable == 'true'
        uses: docker/login-action@v3
        with:
          registry: registry.cn-shanghai.aliyuncs.com
          username: ${{ secrets.ALIYUN_DOCKER_USERNAME }}
          password: ${{ secrets.ALIYUN_DOCKER_PASSWORD }}

      - name: Login to Aliyun Docker Registry (Hong Kong)
        if: steps.set-ref.outputs.is_deployable == 'true'
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hongkong.aliyuncs.com
          username: ${{ secrets.ALIYUN_DOCKER_USERNAME }}
          password: ${{ secrets.ALIYUN_DOCKER_PASSWORD }}

      - name: Tag and Push Docker images
        if: steps.set-ref.outputs.is_deployable == 'true'
        run: |
          docker push registry.cn-shanghai.aliyuncs.com/leaperone/2someren:web-main-latest
          docker tag registry.cn-shanghai.aliyuncs.com/leaperone/2someren:web-main-latest registry.cn-hongkong.aliyuncs.com/leaperone/2someren:web-main-latest
          docker push registry.cn-hongkong.aliyuncs.com/leaperone/2someren:web-main-latest

      - name: Setup Node.js & pnpm
        if: steps.set-ref.outputs.is_deployable == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        if: steps.set-ref.outputs.is_deployable == 'true'
        run: corepack enable && corepack prepare pnpm@11.5.2 --activate

      - name: Install Atlas Community
        if: steps.set-ref.outputs.is_deployable == 'true'
        run: curl -sSf https://atlasgo.sh | sh -s -- -y --community -b /usr/local/bin

      - name: Run database migrations (Atlas)
        if: steps.set-ref.outputs.is_deployable == 'true'
        env:
          TWOSOMEREN_DATABASE_URL: ${{ secrets.TWOSOMEREN_DATABASE_URL }}
          TWOSOMEREN_BILI_DATABASE_URL: ${{ secrets.TWOSOMEREN_BILI_DATABASE_URL }}
          REGION_DATABASE_URL: ${{ secrets.REGION_DATABASE_URL }}
        run: |
          cd apps/web

          echo "Running main DB migration..."
          atlas migrate apply --env=production --config="file://atlas/main/atlas.hcl"

          echo "Running bili DB migration..."
          atlas migrate apply --env=production --config="file://atlas/bili/atlas.hcl"

          if [ -n "$REGION_DATABASE_URL" ]; then
            echo "Running region DB migration..."
            atlas migrate apply --env=production --config="file://atlas/region/atlas.hcl"
          else
            echo "Skipping region migration: REGION_DATABASE_URL not set"
          fi

      - name: Deploy to Production (Shanghai)
        if: steps.set-ref.outputs.is_deployable == 'true'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ALIYUN_CN_HOST }}
          username: ${{ secrets.ALIYUN_CN_USERNAME }}
          port: ${{ secrets.ALIYUN_CN_PORT }}
          key: ${{ secrets.ALIYUN_CN_SSH_PRIVATE_KEY }}
          script: ${{ secrets.DEPLOY_TWOSOMEREN_SCRIPT }}

      - name: Deploy to Production (Hong Kong)
        if: steps.set-ref.outputs.is_deployable == 'true'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ALIYUN_HK_HOST }}
          username: ${{ secrets.ALIYUN_CN_USERNAME }}
          port: ${{ secrets.ALIYUN_CN_PORT }}
          key: ${{ secrets.ALIYUN_CN_SSH_PRIVATE_KEY }}
          script: ${{ secrets.DEPLOY_TWOSOMEREN_HK_SCRIPT }}

  upload-sourcemaps:
    needs: build-and-deploy
    if: needs.build-and-deploy.outputs.is_deployable == 'true'
    uses: ./.github/workflows/upload-telemetry-sourcemaps.yml
    with:
      bundle_key: twosomeren/${{ github.run_id }}-${{ github.run_attempt }}-${{ needs.build-and-deploy.outputs.source_sha }}.tar
      posthog_release_name: 2SOMEone
      posthog_release_version: ${{ needs.build-and-deploy.outputs.source_sha }}
      sentry_project: 2someone-web
      sentry_release: 2someone-web@${{ needs.build-and-deploy.outputs.source_sha }}
    secrets:
      spool_host: ${{ secrets.PVE_APP_HOST_INTERNAL }}
      spool_port: ${{ secrets.PVE_APP_PORT_INTERNAL }}
      spool_username: ${{ secrets.PVE_APP_USERNAME }}
      spool_ssh_key: ${{ secrets.PVE_APP_SSH_KEY }}
      spool_root: ${{ secrets.SOURCEMAP_SPOOL_ROOT }}
      posthog_personal_api_key: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
      posthog_project_id: ${{ secrets.POSTHOG_2SOMEONE_PROJECT_ID }}
      posthog_internal_url: ${{ secrets.POSTHOG_INTERNAL_URL }}
      sentry_auth_token: ${{ secrets.SENTRY_AUTH_TOKEN }}
      sentry_internal_url: ${{ secrets.SENTRY_INTERNAL_URL }}
