name: Verify LEAPERone split frontend release

on:
  pull_request:
    paths:
      - ".github/workflows/verify-pr-leaperone-frontend.yml"
      - ".github/workflows/deploy-de.yml"
      - ".github/workflows/deploy-leaperone*.yml"
      - "compose/leaperone/**"
      - "compose/leaperone-www/**"
      - "compose/leaperone-dashboard/**"
      - "ops/leaperone-frontend/**"
      - "scripts/deploy.sh"

permissions:
  contents: read

concurrency:
  group: verify-leaperone-frontend-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run release contract tests
        run: |
          bash ops/leaperone-frontend/test-manifests.sh
          bash ops/leaperone-frontend/test-routing.sh
          bash ops/leaperone-frontend/test-workflow-contracts.sh

      - name: Check Shell syntax
        run: |
          bash -n \
            compose/leaperone-dashboard/preflight.sh \
            compose/leaperone-dashboard/scripts/10-readiness.sh \
            compose/leaperone-www/preflight.sh \
            compose/leaperone-www/scripts/10-install-nginx-conf.sh \
            compose/leaperone/scripts/10-install-nginx-conf.sh \
            ops/leaperone-frontend/rollback-nginx.sh \
            ops/leaperone-frontend/test-manifests.sh \
            ops/leaperone-frontend/test-routing.sh \
            ops/leaperone-frontend/test-workflow-contracts.sh \
            scripts/deploy.sh

      - name: Parse split frontend Compose files
        run: |
          docker compose -f compose/leaperone-www/docker-compose.yml config --no-interpolate --quiet
          docker compose -f compose/leaperone-dashboard/docker-compose.yml config --no-interpolate --quiet

      - name: Install pinned linters
        env:
          ACTIONLINT_VERSION: 1.7.12
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes shellcheck
          mkdir -p "$RUNNER_TEMP/actionlint"
          cd "$RUNNER_TEMP/actionlint"
          archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          base="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}"
          curl --fail --silent --show-error --location --output "$archive" "$base/$archive"
          curl --fail --silent --show-error --location --output checksums.txt \
            "$base/actionlint_${ACTIONLINT_VERSION}_checksums.txt"
          grep "  $archive\$" checksums.txt | sha256sum --check --strict
          tar -xzf "$archive" actionlint
          echo "$RUNNER_TEMP/actionlint" >> "$GITHUB_PATH"

      - name: Lint split frontend workflows
        run: |
          actionlint -shellcheck= \
            .github/workflows/deploy-de.yml \
            .github/workflows/deploy-leaperone.yml \
            .github/workflows/deploy-leaperone-frontend.yml \
            .github/workflows/deploy-leaperone-www.yml \
            .github/workflows/deploy-leaperone-dashboard.yml \
            .github/workflows/verify-pr-leaperone-frontend.yml

      - name: Lint split frontend Shell scripts
        run: |
          shellcheck --severity=warning \
            compose/leaperone-dashboard/preflight.sh \
            compose/leaperone-dashboard/scripts/10-readiness.sh \
            compose/leaperone-www/preflight.sh \
            compose/leaperone-www/scripts/10-install-nginx-conf.sh \
            compose/leaperone/scripts/10-install-nginx-conf.sh \
            ops/leaperone-frontend/rollback-nginx.sh \
            ops/leaperone-frontend/test-manifests.sh \
            ops/leaperone-frontend/test-routing.sh \
            ops/leaperone-frontend/test-workflow-contracts.sh \
            scripts/deploy.sh

      - name: Validate candidate and cutover Nginx syntax
        run: |
          set -euo pipefail
          fixture="$RUNNER_TEMP/leaperone-nginx"
          mkdir -p "$fixture/ssl/leaper.one" "$fixture/snippets"
          openssl req -x509 -nodes -newkey rsa:2048 -days 1 \
            -keyout "$fixture/ssl/leaper.one/leaper.one.key" \
            -out "$fixture/ssl/leaper.one/fullchain.cer" \
            -subj "/CN=leaper.one" \
            -addext "subjectAltName=DNS:leaper.one,DNS:www.leaper.one,DNS:api.leaper.one,DNS:dashboard.leaper.one,DNS:next.leaper.one" \
            >/dev/null 2>&1
          : > "$fixture/snippets/cloudflare-real-ip.conf"
          cp compose/leaperone-www/nginx/leaperone-proxy-headers.conf \
            "$fixture/snippets/leaperone-proxy-headers.conf"
          for mode in candidate cutover; do
            docker run --rm \
              -v "$PWD/compose/leaperone-www/nginx/leaperone-${mode}-local.conf:/etc/nginx/conf.d/default.conf:ro" \
              -v "$fixture/ssl:/etc/nginx/ssl:ro" \
              -v "$fixture/snippets:/etc/nginx/snippets:ro" \
              nginx:1.28-alpine nginx -t
          done
