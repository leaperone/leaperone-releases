name: Deploy 2SOMEone
run-name: >-
  🚀 Deploy 2SOMEone · ${{ github.event.client_payload.env || inputs.env || 'production' }} · ${{ github.event.client_payload.message || inputs.message || '' }} · @${{ github.event.client_payload.author || github.actor }} [src=${{ github.event.client_payload.source_sha || github.sha }}][env=${{ github.event.client_payload.env || inputs.env || 'production' }}]

on:
  repository_dispatch:
    types: [deploy-twosomeone]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Ref to deploy (only main or web-v* tag accepted when env=production)'
        required: false
        default: 'main'
      env:
        description: 'Deploy environment'
        required: true
        type: choice
        options:
          - production
          - beta
        default: production

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      ref: ${{ steps.set-ref.outputs.ref }}
      pr_number: ${{ steps.set-ref.outputs.pr_number }}
      is_deployable: ${{ steps.set-ref.outputs.is_deployable }}
      is_tag: ${{ steps.set-ref.outputs.is_tag }}
      deploy_env: ${{ steps.set-ref.outputs.deploy_env }}
      source_sha: ${{ steps.set-ref.outputs.source_sha }}
      pointed_tag: ${{ steps.detect-tag.outputs.pointed_tag }}
      components: ${{ steps.set-ref.outputs.components }}
    steps:
      - name: Validate and set ref
        id: set-ref
        env:
          RAW_SOURCE_SHA: ${{ github.event.client_payload.source_sha }}
        run: |
          REF="${{ github.event.inputs.ref || github.event.client_payload.ref }}"
          ENV_INPUT="${{ github.event.inputs.env || github.event.client_payload.env }}"
          COMPONENTS="${{ github.event.client_payload.components || github.event.client_payload.build_targets }}"
          SOURCE_SHA=""
          if [[ "$RAW_SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            SOURCE_SHA="$RAW_SOURCE_SHA"
          fi
          printf 'source_sha=%s\n' "$SOURCE_SHA" >> "$GITHUB_OUTPUT"

          # Default deploy environment
          DEPLOY_ENV="${ENV_INPUT:-production}"

          if [ -z "$COMPONENTS" ]; then
            COMPONENTS="web"
          fi
          DEPLOY_WEB="false"
          IFS=',' read -ra COMPONENT_LIST <<< "$COMPONENTS"
          for component in "${COMPONENT_LIST[@]}"; do
            component="${component//[[:space:]]/}"
            case "$component" in
              web|all)
                DEPLOY_WEB="true"
                ;;
              "")
                ;;
              *)
                echo "ERROR: deploy-twosomeone only supports components=web, got: $component" >&2
                exit 1
                ;;
            esac
          done
          if [ "$DEPLOY_WEB" != "true" ]; then
            echo "ERROR: no 2SOMEone web component selected from: $COMPONENTS" >&2
            exit 1
          fi
          echo "components=web" >> "$GITHUB_OUTPUT"

          # workflow_dispatch + env=production: restrict to main or web-v* tag (security)
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "$DEPLOY_ENV" == "production" ]]; then
            if [[ "$REF" == "main" || "$REF" == "refs/heads/main" || "$REF" =~ ^web-v[0-9]+\.[0-9]+\.[0-9]+ || "$REF" =~ ^refs/tags/web-v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
              IS_TAG=$([[ "$REF" =~ ^(refs/tags/)?web-v ]] && echo true || echo false)
              echo "ref=$REF" >> $GITHUB_OUTPUT
              echo "pr_number=" >> $GITHUB_OUTPUT
              echo "is_deployable=true" >> $GITHUB_OUTPUT
              echo "is_tag=$IS_TAG" >> $GITHUB_OUTPUT
              echo "deploy_env=production" >> $GITHUB_OUTPUT
              echo "manual production validation: ref=$REF (is_tag=$IS_TAG)"
              IS_DEPLOYABLE=true
            else
              echo "ERROR: workflow_dispatch with env=production only accepts ref=main or web-v* tags, got: $REF" >&2
              exit 1
            fi
          elif [ -z "$REF" ]; then
            echo "ref=main" >> $GITHUB_OUTPUT
            echo "pr_number=" >> $GITHUB_OUTPUT
            echo "is_deployable=true" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
            echo "deploy_env=$DEPLOY_ENV" >> $GITHUB_OUTPUT
            echo "使用默认分支: main (ref 为空)"
            IS_DEPLOYABLE=true
          elif [[ "$REF" == "main" ]] || [[ "$REF" == "refs/heads/main" ]]; then
            echo "ref=$REF" >> $GITHUB_OUTPUT
            echo "pr_number=" >> $GITHUB_OUTPUT
            echo "is_deployable=true" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
            echo "deploy_env=$DEPLOY_ENV" >> $GITHUB_OUTPUT
            echo "使用 main 分支: $REF"
            IS_DEPLOYABLE=true
          elif [[ "$REF" =~ ^([0-9]+)/merge ]] || [[ "$REF" == *"/merge"* ]]; then
            echo "ERROR: deploy-twosomeone is deploy-only. PR merge refs are handled by verify-pr-twosomeone. Got ref: $REF" >&2
            exit 1
          elif [[ "$REF" =~ ^(web-)?v[0-9]+\.[0-9]+\.[0-9]+ ]] || [[ "$REF" =~ ^refs/tags/ ]]; then
            echo "ref=$REF" >> $GITHUB_OUTPUT
            echo "pr_number=" >> $GITHUB_OUTPUT
            echo "is_deployable=true" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
            echo "deploy_env=$DEPLOY_ENV" >> $GITHUB_OUTPUT
            echo "检测到 tag: $REF，将执行部署"
            IS_DEPLOYABLE=true
          else
            echo "ERROR: deploy-twosomeone only accepts deployable refs (main or web-v* tags). Got ref: $REF" >&2
            exit 1
          fi

      - name: Detect web-v* tag pointing at source_sha
        id: detect-tag
        if: github.event_name == 'repository_dispatch' && steps.set-ref.outputs.is_deployable == 'true' && steps.set-ref.outputs.deploy_env == 'beta' && steps.set-ref.outputs.source_sha != ''
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          SOURCE_SHA: ${{ steps.set-ref.outputs.source_sha }}
        run: |
          SOURCE_SHA="$SOURCE_SHA"
          POINTED_TAG=""
          deadline=$(( $(date +%s) + 90 ))
          while [ "$(date +%s)" -lt "$deadline" ]; do
            refs=$(gh api repos/leaperone/2SOMEone/git/matching-refs/tags/web-v --jq '.[]')
            while IFS= read -r row; do
              [ -z "$row" ] && continue
              ref=$(echo "$row" | jq -r '.ref')
              type=$(echo "$row" | jq -r '.object.type')
              sha=$(echo "$row" | jq -r '.object.sha')
              if [ "$type" = "tag" ]; then
                sha=$(gh api "repos/leaperone/2SOMEone/git/tags/$sha" --jq '.object.sha')
              fi
              if [ "$sha" = "$SOURCE_SHA" ]; then
                POINTED_TAG="${ref#refs/tags/}"
                break 2
              fi
            done <<< "$(echo "$refs" | jq -c '.')"
            sleep 10
          done
          echo "pointed_tag=$POINTED_TAG" >> "$GITHUB_OUTPUT"

      - name: Wait for tag-priority deploy
        if: steps.detect-tag.outputs.pointed_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          POINTED_TAG: ${{ steps.detect-tag.outputs.pointed_tag }}
          SOURCE_SHA: ${{ steps.set-ref.outputs.source_sha }}
          SELF_RUN: ${{ github.run_id }}
        run: |
          POINTED_TAG="$POINTED_TAG"
          SOURCE_SHA="$SOURCE_SHA"
          if [[ ! "$POINTED_TAG" =~ ^web-v[0-9]+\.[0-9]+\.[0-9]+$ || ! "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::warning::Invalid tag-priority inputs; treating as no tag."
            exit 0
          fi
          sleep 30
          deadline=$(( $(date +%s) + 60 * 60 ))
          ever_seen=false
          while [ "$(date +%s)" -lt "$deadline" ]; do
            matching=$(gh run list \
              -R "$GITHUB_REPOSITORY" \
              -w "Deploy 2SOMEone" \
              -e repository_dispatch \
              -L 100 \
              --json databaseId,status,displayTitle \
              | jq \
                --arg src "[src=$SOURCE_SHA]" \
                --arg env_token "[env=production]" \
                '[.[] | select(.databaseId != (env.SELF_RUN | tonumber)) | select(.displayTitle | contains($src)) | select(.displayTitle | contains($env_token))]')
            total=$(echo "$matching" | jq 'length')
            active=$(echo "$matching" | jq '[.[] | select(.status != "completed")] | length')
            if [ "$total" -gt 0 ]; then ever_seen=true; fi
            if [ "$ever_seen" = true ] && [ "$active" = "0" ]; then
              echo "Production run for $POINTED_TAG finished; proceeding."; exit 0
            fi
            echo "matching_total=$total active=$active ever_seen=$ever_seen; waiting..."
            sleep 30
          done
          echo "::warning::Timed out after 60min waiting for tag $POINTED_TAG; proceeding."

  build-and-push:
    needs: prepare
    if: needs.prepare.outputs.is_deployable == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-twosomeone-deployable
      cancel-in-progress: false
    outputs:
      app_sha: ${{ steps.app-sha.outputs.sha }}
      sentry_release: ${{ steps.sentry.outputs.release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          repository: leaperone/2SOMEone
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Check Skip CI
        run: |
          if grep -q "noci" <<< "${{ github.event.client_payload.message || '' }}"; then
            echo "跳过构建: commit message 包含 'noci'"
            exit 78
          fi

      - name: Compute app SHA
        id: app-sha
        run: echo "sha=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - name: Set Sentry release
        id: sentry
        run: echo "release=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Validate Sentry source map env
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_DSN: ${{ vars.TWOSOMEONE_SENTRY_DSN }}
          POSTHOG_PROJECT_TOKEN: ${{ vars.POSTHOG_2SOMEONE_PROJECT_TOKEN }}
        run: |
          test -n "$SENTRY_AUTH_TOKEN" || {
            echo "SENTRY_AUTH_TOKEN is required for deployable web builds"
            exit 1
          }
          if ! [[ "$SENTRY_DSN" =~ ^https://[A-Za-z0-9._-]+@s\.2some\.one/[0-9]+$ ]]; then
            echo "TWOSOMEONE_SENTRY_DSN must use the 2SOMEone product ingest domain" >&2
            exit 1
          fi
          test -n "$POSTHOG_PROJECT_TOKEN" || {
            echo "POSTHOG_2SOMEONE_PROJECT_TOKEN is required for deployable web builds"
            exit 1
          }

      - name: Login to Aliyun Docker Registry (Shanghai)
        uses: docker/login-action@v4
        with:
          registry: registry.cn-shanghai.aliyuncs.com
          username: ${{ secrets.ALIYUN_DOCKER_USERNAME }}
          password: ${{ secrets.ALIYUN_DOCKER_PASSWORD }}

      - name: Login to Aliyun Docker Registry (Hong Kong)
        if: needs.prepare.outputs.is_tag == 'true' || needs.prepare.outputs.deploy_env == 'beta'
        uses: docker/login-action@v4
        with:
          registry: registry.cn-hongkong.aliyuncs.com
          username: ${{ secrets.ALIYUN_DOCKER_USERNAME }}
          password: ${{ secrets.ALIYUN_DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore Next.js build cache
        id: nextcache
        uses: actions/cache@v4
        with:
          path: .docker-cache/next
          key: web-buildcache-deploy-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            web-buildcache-deploy-${{ runner.os }}-

      - name: Inject build cache into buildkit
        uses: reproducible-containers/buildkit-cache-dance@v3.1.2
        with:
          scratch-dir: ${{ runner.temp }}/buildkit-cache-dance
          cache-map: |
            {
              ".docker-cache/next": { "target": "/app/apps/web/.next/cache", "id": "next-2someone-web" }
            }

      - name: Compute Docker tags
        id: docker-tags
        run: |
          APP_SHA="${{ steps.app-sha.outputs.sha }}"
          IS_TAG="${{ needs.prepare.outputs.is_tag }}"
          IS_BETA="${{ needs.prepare.outputs.deploy_env == 'beta' }}"

          TAGS=""
          # ACR Shanghai: always
          TAGS+="registry.cn-shanghai.aliyuncs.com/leaperone/2someren:web-main-latest"$'\n'
          TAGS+="registry.cn-shanghai.aliyuncs.com/leaperone/2someren:web-${APP_SHA}"$'\n'
          # ACR Hong Kong: tag releases or beta deploys
          if [ "$IS_TAG" == "true" ] || [ "$IS_BETA" == "true" ]; then
            TAGS+="registry.cn-hongkong.aliyuncs.com/leaperone/2someren:web-main-latest"$'\n'
            TAGS+="registry.cn-hongkong.aliyuncs.com/leaperone/2someren:web-${APP_SHA}"$'\n'
          fi
          {
            echo "tags<<EOF"
            echo -n "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and Push (deployable)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/docker/Dockerfile
          target: final
          push: true
          load: false
          tags: ${{ steps.docker-tags.outputs.tags }}
          cache-from: type=gha,scope=web-twosomeone-deploy
          cache-to: type=gha,scope=web-twosomeone-deploy,mode=max,ignore-error=true
          build-args: |
            POSTHOG_2SOMEONE_ENV_ID=${{ secrets.POSTHOG_2SOMEONE_PROJECT_ID }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ vars.POSTHOG_2SOMEONE_PROJECT_TOKEN }}
            NEXT_PUBLIC_POSTHOG_HOST=https://t.2some.one
            NEXT_PUBLIC_SENTRY_DSN=${{ vars.TWOSOMEONE_SENTRY_DSN }}
            NEXT_PUBLIC_ALIYUN_CAPTCHA_APP_ID=f8dacc7f8c6e0585d3e2d86a937181e5
            SENTRY_URL=${{ secrets.SENTRY_INTERNAL_URL }}
            SENTRY_ORG=leaperone
            SENTRY_PROJECT=2someone-web
            SENTRY_ENVIRONMENT=${{ needs.prepare.outputs.deploy_env }}
            SENTRY_RELEASE=2someone-web@${{ steps.sentry.outputs.release }}
          secrets: |
            sentry_auth_token=${{ secrets.SENTRY_AUTH_TOKEN }}
            posthog_personal_api_key=${{ secrets.POSTHOG_PERSONAL_API_KEY }}
            posthog_cli_project_id=${{ secrets.POSTHOG_2SOMEONE_PROJECT_ID }}
            next_server_actions_encryption_key=${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}

      - name: Extract source maps from same buildkit cache
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/docker/Dockerfile
          target: sourcemaps
          outputs: type=local,dest=./sourcemaps
          build-args: |
            POSTHOG_2SOMEONE_ENV_ID=${{ secrets.POSTHOG_2SOMEONE_PROJECT_ID }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ vars.POSTHOG_2SOMEONE_PROJECT_TOKEN }}
            NEXT_PUBLIC_POSTHOG_HOST=https://t.2some.one
            NEXT_PUBLIC_SENTRY_DSN=${{ vars.TWOSOMEONE_SENTRY_DSN }}
            NEXT_PUBLIC_ALIYUN_CAPTCHA_APP_ID=f8dacc7f8c6e0585d3e2d86a937181e5
            SENTRY_URL=${{ secrets.SENTRY_INTERNAL_URL }}
            SENTRY_ORG=leaperone
            SENTRY_PROJECT=2someone-web
            SENTRY_ENVIRONMENT=${{ needs.prepare.outputs.deploy_env }}
            SENTRY_RELEASE=2someone-web@${{ steps.sentry.outputs.release }}
          secrets: |
            sentry_auth_token=${{ secrets.SENTRY_AUTH_TOKEN }}
            posthog_personal_api_key=${{ secrets.POSTHOG_PERSONAL_API_KEY }}
            posthog_cli_project_id=${{ secrets.POSTHOG_2SOMEONE_PROJECT_ID }}
            next_server_actions_encryption_key=${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}

      - name: Pack source maps (avoid colon-in-filename limitation)
        run: tar -czf sourcemaps.tar -C ./sourcemaps/next .

      - name: Checkout source map transport
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          path: .release-automation
          persist-credentials: false

      - name: Stage exact-build source maps on DE spool
        env:
          SOURCEMAP_SPOOL_HOST: ${{ secrets.DE_APP_HOST }}
          SOURCEMAP_SPOOL_PORT: ${{ vars.DE_APP_PORT || '22' }}
          SOURCEMAP_SPOOL_USERNAME: ${{ secrets.DE_APP_USERNAME }}
          SOURCEMAP_SPOOL_SSH_KEY: ${{ secrets.DE_APP_SSH_KEY }}
          SOURCEMAP_SPOOL_ROOT: ${{ secrets.SOURCEMAP_SPOOL_ROOT }}
          BUNDLE_KEY: twosomeone/${{ github.run_id }}-${{ github.run_attempt }}-${{ steps.app-sha.outputs.sha }}.tar
        run: .release-automation/scripts/stage-sourcemap-bundle.sh sourcemaps.tar "$BUNDLE_KEY"

      - name: Install Atlas Community
        run: curl -sSf https://atlasgo.sh | sh -s -- -y --community -b /usr/local/bin

      - name: Run database migrations (Atlas)
        env:
          TWOSOMEREN_DATABASE_URL: ${{ secrets.TWOSOMEREN_DATABASE_URL }}
          TWOSOMEREN_BILI_DATABASE_URL: ${{ secrets.TWOSOMEREN_BILI_DATABASE_URL }}
          REGION_DATABASE_URL: ${{ secrets.REGION_DATABASE_URL }}
        run: |
          cd apps/web

          echo "Running main DB migration..."
          atlas migrate apply --env=production --config="file://atlas/main/atlas.hcl"

          echo "Running bili DB migration..."
          atlas migrate apply --env=production --config="file://atlas/bili/atlas.hcl"

          if [ -n "$REGION_DATABASE_URL" ]; then
            echo "Running region DB migration..."
            atlas migrate apply --env=production --config="file://atlas/region/atlas.hcl"
          else
            echo "Skipping region migration: REGION_DATABASE_URL not set"
          fi

  # Production schema-drift gate. Runs AFTER build-and-push has applied migrations,
  # so prod should now be fully synced with the drizzle source-of-truth. A diff here
  # means the migration under-covered the schema change or prod drifted out-of-band;
  # either way we must NOT roll new containers onto a divergent DB, so this job hard-
  # fails and deploy-shanghai/deploy-hongkong (which `needs` it) are blocked.
  #
  # Running post-apply (rather than as a standalone scheduled monitor) deliberately
  # avoids the old false-positive where `main` runs ahead of prod between a migration
  # merging and the next release applying it — by this point the apply has happened.
  drift-check:
    needs: [prepare, build-and-push]
    if: needs.prepare.outputs.is_deployable == 'true' && needs.prepare.outputs.is_tag == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: dev
        ports:
          - 5432:5432
        options: --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - name: Checkout 2SOMEone
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.ACCESS_TOKEN }}
          repository: leaperone/2SOMEone
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@11.5.2 --activate

      - name: Install dependencies
        # Root install (no --filter) so pnpm sees the full workspace; drizzle-kit
        # is needed by scripts/atlas-build-source.sh to regenerate _source.sql.
        run: pnpm install --frozen-lockfile

      - name: Install Atlas Community
        run: curl -sSf https://atlasgo.sh | sh -s -- -y --community -b /usr/local/bin

      - name: Build atlas source files
        working-directory: apps/web
        run: bash scripts/atlas-build-source.sh

      - name: Schema drift check (main)
        working-directory: apps/web
        env:
          TWOSOMEREN_DATABASE_URL: ${{ secrets.TWOSOMEREN_DATABASE_URL }}
          ATLAS_DEV_URL: "postgres://postgres:dev@localhost:5432/dev?sslmode=disable&search_path=public"
        run: |
          # set +e so a connection/parse/community-edition failure stays distinguishable
          # from genuine schema drift (an empty `out` would otherwise read as "drift").
          set +e
          # Atlas requires --from and --to to share scope. The file source is loaded at
          # schema scope (dev-url pins search_path=public), so the prod connection must be
          # pinned to the public schema too, otherwise atlas errors with
          # "cannot diff a database connection with a schema". The secret may or may not
          # already carry query params / search_path, so normalize defensively.
          to="$TWOSOMEREN_DATABASE_URL"
          case "$to" in
            *search_path=*) : ;;
            *\?*) to="$to&search_path=public" ;;
            *)    to="$to?search_path=public" ;;
          esac
          # UserSummary_MV is an out-of-band materialized view (.existing() in drizzle,
          # absent from _source.sql). Atlas community can't diff matviews; exclude it or
          # the check false-positives. See 2SOMEone#364.
          out=$(atlas schema diff \
            --from "file://atlas/main/_source.sql?format=postgres" \
            --to "$to" \
            --dev-url "$ATLAS_DEV_URL" \
            --exclude "drizzle.*" \
            --exclude "public.UserSummary_MV" 2>&1)
          rc=$?
          echo "$out"
          if [ $rc -ne 0 ]; then
            echo "::error::atlas schema diff (main) FAILED to run (exit $rc) — atlas/connection error, NOT drift. See output above."
            exit 1
          fi
          if ! echo "$out" | grep -q "Schemas are synced"; then
            echo "::error::Main schema drift after migrate apply — prod diverges from drizzle source-of-truth. Blocking deploy. Reconcile drizzle schema / migrations / prod."
            exit 1
          fi

      - name: Schema drift check (region)
        working-directory: apps/web
        env:
          REGION_DATABASE_URL: ${{ secrets.REGION_DATABASE_URL }}
          ATLAS_DEV_URL: "postgres://postgres:dev@localhost:5432/dev?sslmode=disable&search_path=public"
        run: |
          # Mirror build-and-push: region is optional, skip cleanly when unconfigured.
          if [ -z "$REGION_DATABASE_URL" ]; then
            echo "Skipping region drift check: REGION_DATABASE_URL not set"
            exit 0
          fi
          set +e
          # Pin the prod connection to the public schema so it matches the file source's
          # scope (see main step). Without this atlas errors with
          # "cannot diff a database connection with a schema".
          to="$REGION_DATABASE_URL"
          case "$to" in
            *search_path=*) : ;;
            *\?*) to="$to&search_path=public" ;;
            *)    to="$to?search_path=public" ;;
          esac
          out=$(atlas schema diff \
            --from "file://atlas/region/_source.sql?format=postgres" \
            --to "$to" \
            --dev-url "$ATLAS_DEV_URL" \
            --exclude "drizzle.*" 2>&1)
          rc=$?
          echo "$out"
          if [ $rc -ne 0 ]; then
            echo "::error::atlas schema diff (region) FAILED to run (exit $rc) — atlas/connection error, NOT drift. See output above."
            exit 1
          fi
          if ! echo "$out" | grep -q "Schemas are synced"; then
            echo "::error::Region schema drift after migrate apply — prod diverges from source. Blocking deploy."
            exit 1
          fi

      - name: Schema drift check (bili)
        working-directory: apps/web
        env:
          TWOSOMEREN_BILI_DATABASE_URL: ${{ secrets.TWOSOMEREN_BILI_DATABASE_URL }}
          ATLAS_DEV_URL: "postgres://postgres:dev@localhost:5432/dev?sslmode=disable&search_path=public"
        run: |
          set +e
          # Pin the prod connection to the public schema so it matches the file source's
          # scope (see main step). Without this atlas errors with
          # "cannot diff a database connection with a schema".
          to="$TWOSOMEREN_BILI_DATABASE_URL"
          case "$to" in
            *search_path=*) : ;;
            *\?*) to="$to&search_path=public" ;;
            *)    to="$to?search_path=public" ;;
          esac
          # Out-of-band materialized views (.existing() in drizzle, absent from
          # _source.sql). Atlas community can't diff matviews; exclude them. See 2SOMEone#364.
          out=$(atlas schema diff \
            --from "file://atlas/bili/_source.sql?format=postgres" \
            --to "$to" \
            --dev-url "$ATLAS_DEV_URL" \
            --exclude "drizzle.*" \
            --exclude "public.LiveSession_MV" \
            --exclude "public.GiftDailySummary_MV" \
            --exclude "public.GiftTotalSummary_MV" 2>&1)
          rc=$?
          echo "$out"
          if [ $rc -ne 0 ]; then
            echo "::error::atlas schema diff (bili) FAILED to run (exit $rc) — atlas/connection error, NOT drift. See output above."
            exit 1
          fi
          if ! echo "$out" | grep -q "Schemas are synced"; then
            echo "::error::Bili schema drift after migrate apply — prod diverges from source. Blocking deploy."
            exit 1
          fi

  upload-sourcemaps:
    needs: [prepare, build-and-push]
    if: needs.prepare.outputs.is_deployable == 'true'
    uses: ./.github/workflows/upload-telemetry-sourcemaps.yml
    with:
      bundle_key: twosomeone/${{ github.run_id }}-${{ github.run_attempt }}-${{ needs.build-and-push.outputs.app_sha }}.tar
      posthog_release_name: 2SOMEone
      posthog_release_version: ${{ needs.build-and-push.outputs.sentry_release }}
      sentry_project: 2someone-web
      sentry_release: 2someone-web@${{ needs.build-and-push.outputs.sentry_release }}
    secrets:
      spool_host: ${{ secrets.DE_APP_HOST }}
      spool_username: ${{ secrets.DE_APP_USERNAME }}
      spool_ssh_key: ${{ secrets.DE_APP_SSH_KEY }}
      spool_root: ${{ secrets.SOURCEMAP_SPOOL_ROOT }}
      posthog_personal_api_key: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
      posthog_project_id: ${{ secrets.POSTHOG_2SOMEONE_PROJECT_ID }}
      posthog_internal_url: ${{ secrets.POSTHOG_INTERNAL_URL }}
      sentry_auth_token: ${{ secrets.SENTRY_AUTH_TOKEN }}
      sentry_internal_url: ${{ secrets.SENTRY_INTERNAL_URL }}

  deploy-pve:
    needs: [prepare, build-and-push]
    if: needs.prepare.outputs.is_deployable == 'true' && needs.prepare.outputs.deploy_env != 'beta'
    uses: ./.github/workflows/deploy-pve.yml
    with:
      project: twosomeone
      env: ${{ needs.prepare.outputs.deploy_env }}
      internal: false
    secrets: inherit

  deploy-hk-beta:
    needs: [prepare, build-and-push]
    if: needs.prepare.outputs.is_deployable == 'true' && needs.prepare.outputs.deploy_env == 'beta'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Beta to Hong Kong
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ALIYUN_HK_HOST }}
          username: ${{ secrets.ALIYUN_CN_USERNAME }}
          port: ${{ secrets.ALIYUN_CN_PORT }}
          key: ${{ secrets.ALIYUN_CN_SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: /home/leaperone/services/2someren-web/beta/deploy.sh

  deploy-shanghai:
    needs: [prepare, build-and-push, drift-check]
    if: needs.prepare.outputs.is_tag == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Production (Shanghai)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ALIYUN_CN_HOST }}
          username: ${{ secrets.ALIYUN_CN_USERNAME }}
          port: ${{ secrets.ALIYUN_CN_PORT }}
          key: ${{ secrets.ALIYUN_CN_SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: ${{ secrets.DEPLOY_TWOSOMEREN_SCRIPT }}

  deploy-hongkong:
    needs: [prepare, build-and-push, drift-check]
    if: needs.prepare.outputs.is_tag == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Production (Hong Kong)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ALIYUN_HK_HOST }}
          username: ${{ secrets.ALIYUN_CN_USERNAME }}
          port: ${{ secrets.ALIYUN_CN_PORT }}
          key: ${{ secrets.ALIYUN_CN_SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: ${{ secrets.DEPLOY_TWOSOMEREN_HK_SCRIPT }}

  cdn-refresh:
    needs: [prepare, deploy-shanghai, deploy-hongkong]
    if: needs.prepare.outputs.is_tag == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Purge CDN cache
        env:
          DOGECLOUD_ACCESS_KEY: ${{ secrets.DOGECLOUD_ACCESS_KEY }}
          DOGECLOUD_SECRET_KEY: ${{ secrets.DOGECLOUD_SECRET_KEY }}
        run: |
          python3 << 'PYEOF'
          import hmac, hashlib, urllib.request, urllib.parse, json, os, time

          access_key = os.environ['DOGECLOUD_ACCESS_KEY']
          secret_key = os.environ['DOGECLOUD_SECRET_KEY']

          def dogecloud_api(api_path, body=''):
              sign_str = api_path + '\n' + body
              sign = hmac.new(secret_key.encode(), sign_str.encode('utf-8'), hashlib.sha1).digest().hex()
              url = 'https://api.dogecloud.com' + api_path
              req = urllib.request.Request(url, data=body.encode() if body else None, method='POST' if body else 'GET')
              req.add_header('Authorization', 'TOKEN ' + access_key + ':' + sign)
              if body:
                  req.add_header('Content-Type', 'application/x-www-form-urlencoded')
              resp = urllib.request.urlopen(req)
              return json.loads(resp.read().decode())

          # 1. Submit refresh task
          body = urllib.parse.urlencode({'rtype': 'path', 'urls': 'https://2some.ren/'})
          result = dogecloud_api('/cdn/refresh/add.json', body)
          print(json.dumps(result, indent=2))
          if result['code'] != 200:
              raise Exception(f"CDN refresh failed: {result}")
          task_id = result['data']['task_id']
          print(f"Task submitted: {task_id}")

          # 2. Poll until done
          for i in range(30):
              time.sleep(10)
              query = dogecloud_api(f'/cdn/refresh/query.json?id={task_id}')
              if query['code'] != 200:
                  print(f"Query error: {query}")
                  continue
              tasks = query['data'].get('tasks', [])
              if not tasks:
                  print(f"[{i+1}] No task info yet...")
                  continue
              task = tasks[0]
              status = task['status']
              pct = task.get('percent', 0)
              print(f"[{i+1}] status={status} percent={pct}%")
              if status == 'done':
                  print("CDN cache purged successfully!")
                  break
              if status == 'failed':
                  raise Exception("CDN refresh task failed")
          else:
              raise Exception("CDN refresh timed out after 300s (30 * 10s)")
          PYEOF
