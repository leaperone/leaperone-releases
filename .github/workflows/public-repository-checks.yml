name: Public repository checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  repository-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Enforce public repository policy
        shell: bash
        run: |
          set -euo pipefail

          if [ -d ops ]; then
            echo "ERROR: operational runbooks do not belong in this repository" >&2
            exit 1
          fi

          invalid_runs_on="$(
            rg -n '^[[:space:]]*runs-on:' .github/workflows \
              | rg -v 'runs-on:[[:space:]]+ubuntu-latest$' \
              | rg -v 'runs-on:[[:space:]]+\[self-hosted, Linux, X64, pve\]$' || true
          )"
          if [ -n "$invalid_runs_on" ]; then
            echo "ERROR: workflows must use ubuntu-latest or the organization PVE runner" >&2
            printf '%s\n' "$invalid_runs_on" >&2
            exit 1
          fi

          if rg -n 'ph[ctx]_[A-Za-z0-9]+' .github/workflows scripts; then
            echo "ERROR: PostHog credentials and project tokens must come from GitHub secrets or variables" >&2
            exit 1
          fi

          if rg -n '/(etc|opt|srv|var)/|(^|[[:space:]])ssh([[:space:]]|$)' README.md; then
            echo "ERROR: README.md exposes operational details" >&2
            exit 1
          fi
