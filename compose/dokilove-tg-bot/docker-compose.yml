name: dokilove-tg-bot-${DEPLOY_ENV:-production}

services:
  tg-bot:
    image: ${REGISTRY_HOST:-registry.cn-hongkong.aliyuncs.com}/leaperone/dokilove:${TGBOT_IMAGE_TAG:-tg-bot-latest}
    container_name: dokilove-tg-bot-${DEPLOY_ENV:-production}
    env_file:
      - .env
    ports:
      - '127.0.0.1:${TGBOT_PORT:-3200}:3200'
    networks:
      - leaperone-prod
    restart: unless-stopped

networks:
  leaperone-prod:
    external: true
