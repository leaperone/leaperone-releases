name: dokilove-${DEPLOY_ENV:-production}

services:
  web:
    image: ${REGISTRY_HOST:-registry.cn-hongkong.aliyuncs.com}/leaperone/dokilove:${IMAGE_TAG:-latest}
    container_name: dokilove-web-${DEPLOY_ENV:-production}
    env_file:
      - .env
    ports:
      - '127.0.0.1:${WEB_PORT:-9810}:3000'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      # User/admin imports write media to the DE hot layer. JP is only archive/fallback.
      OSS_REQUIRE_HOT_STORAGE: ${OSS_REQUIRE_HOT_STORAGE:-true}
      OSS_HOT_ENDPOINT: ${OSS_HOT_ENDPOINT:-http://dokilove-media-hot-production:9000}
      OSS_HOT_KEY_ID: ${OSS_HOT_KEY_ID}
      OSS_HOT_SECRET: ${OSS_HOT_SECRET}
      OSS_HOT_BUCKET: ${OSS_HOT_BUCKET:-media}
      OSS_HOT_REGION: ${OSS_HOT_REGION:-us-east-1}
      OSS_MAX_BYTES: ${OSS_MAX_BYTES:-15728640}
      OSS_SOURCE_ALLOWLIST: ${OSS_SOURCE_ALLOWLIST}
      OSS_PUBLIC_BASE_URL: ${OSS_PUBLIC_BASE_URL:-https://lb.doki.love}
      # Legacy JP_OSS_* variables stay for compatibility with older images.
      JP_OSS_ENDPOINT: ${JP_OSS_ENDPOINT:-https://lb-jp.leaper.one}
      JP_OSS_KEY_ID: ${JP_OSS_KEY_ID}
      JP_OSS_SECRET: ${JP_OSS_SECRET}
      JP_OSS_BUCKET: ${JP_OSS_BUCKET:-media}
      JP_OSS_REGION: ${JP_OSS_REGION:-garage}
      JP_OSS_MAX_BYTES: ${JP_OSS_MAX_BYTES:-10485760}
      JP_OSS_SOURCE_ALLOWLIST: ${JP_OSS_SOURCE_ALLOWLIST}
    networks:
      - leaperone-prod
    restart: unless-stopped

networks:
  leaperone-prod:
    external: true
