# DokiLove Germany direct-origin TLS termination.
# Install to /etc/nginx/sites-enabled/dokilove-local.conf.
#
# Flow:
#   Cloudflare -> Germany Nginx:443 -> 127.0.0.1:9810 -> local Docker web

server {
    listen 443 ssl http2;
    server_name doki.love www.doki.love;

    ssl_certificate     /etc/nginx/ssl/doki.love/fullchain.cer;
    ssl_certificate_key /etc/nginx/ssl/doki.love/doki.love.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    include /etc/nginx/snippets/cloudflare-real-ip.conf;
    proxy_buffering off;

    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_set_header Upgrade-Insecure-Requests 1;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
        proxy_pass http://127.0.0.1:9810;
        client_max_body_size 20m;
    }
}
