name: twosomeone-${DEPLOY_ENV:-production}

services:
  web:
    image: ${REGISTRY_HOST:-registry.cn-shanghai.aliyuncs.com}/leaperone/2someren:${IMAGE_TAG:-web-main-latest}
    container_name: twosomeone-web-${DEPLOY_ENV:-production}
    ports:
      - "${WEB_PORT:-3000}:3000"
    env_file:
      - .env
    volumes:
      - ./alipay-cert:/app/alipay-cert
    # Web → backend reverse calls on PVE go via host-gateway:
    # BACKEND_BASE_URL=http://host.docker.internal:3003 (LXC 200 only;
    # Shanghai / HK web hosts use https://backend.2some.ren over the public path).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
