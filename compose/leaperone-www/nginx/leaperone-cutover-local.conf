# LEAPERone split frontend cutover routing on the Germany origin.
#
# Public site:       leaper.one / www.leaper.one -> 127.0.0.1:9820
# Dashboard:         dashboard.leaper.one         -> 127.0.0.1:9821
# API/compat:        api.leaper.one               -> 127.0.0.1:9801
# Temporary POST issue adapter: root exact exchange -> legacy Web :9800

server {
    listen 443 ssl http2;
    server_name leaper.one www.leaper.one;

    ssl_certificate     /etc/nginx/ssl/leaper.one/fullchain.cer;
    ssl_certificate_key /etc/nginx/ssl/leaper.one/leaper.one.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    include /etc/nginx/snippets/cloudflare-real-ip.conf;
    proxy_buffering off;

    # This exact method split must win before the general legacy CLI prefix.
    # POST serves already-open legacy authorization pages for the short
    # compatibility phase; PUT and all other methods go to the API adapter.
    location = /api/v1/cli/auth/exchange {
        error_page 418 = @legacy_cli_issue;
        if ($request_method = POST) { return 418; }

        proxy_pass http://127.0.0.1:9801;
        proxy_set_header Host api.leaper.one;
        include /etc/nginx/snippets/leaperone-proxy-headers.conf;
    }

    location @legacy_cli_issue {
        proxy_pass http://127.0.0.1:9800;
        proxy_set_header Host leaper.one;
        include /etc/nginx/snippets/leaperone-proxy-headers.conf;
    }

    # Legacy CLI aliases and EnvX preserve method, body, Authorization, URI,
    # and response envelope through transparent API proxying.
    location = /api/v1/cli {
        proxy_pass http://127.0.0.1:9801;
        proxy_set_header Host api.leaper.one;
        include /etc/nginx/snippets/leaperone-proxy-headers.conf;
    }

    location ^~ /api/v1/cli/ {
        proxy_pass http://127.0.0.1:9801;
        proxy_set_header Host api.leaper.one;
        include /etc/nginx/snippets/leaperone-proxy-headers.conf;
    }

    location = /api/v1/envx {
        proxy_pass http://127.0.0.1:9801;
        proxy_set_header Host api.leaper.one;
        include /etc/nginx/snippets/leaperone-proxy-headers.conf;
    }

    location ^~ /api/v1/envx/ {
        proxy_pass http://127.0.0.1:9801;
        proxy_set_header Host api.leaper.one;
        include /etc/nginx/snippets/leaperone-proxy-headers.conf;
    }

    # Pending legacy orders require exact path rewrites to API-owned webhooks.
    location = /api/recharge/notify/stripe {
        proxy_pass http://127.0.0.1:9801/webhooks/payments/stripe;
        proxy_set_header Host api.leaper.one;
        include /etc/nginx/snippets/leaperone-proxy-headers.conf;
    }

    location = /api/recharge/notify/alipay {
        proxy_pass http://127.0.0.1:9801/webhooks/payments/alipay;
        proxy_set_header Host api.leaper.one;
        include /etc/nginx/snippets/leaperone-proxy-headers.conf;
    }

    # Better Auth and device protocol endpoints remain Dashboard-owned. The
    # original root host is carried separately for compatibility/audit logic.
    location = /api/auth {
        proxy_pass http://127.0.0.1:9821;
        proxy_set_header Host dashboard.leaper.one;
        proxy_set_header X-Forwarded-Host $host;
        include /etc/nginx/snippets/leaperone-proxy-headers.conf;
    }

    location ^~ /api/auth/ {
        proxy_pass http://127.0.0.1:9821;
        proxy_set_header Host dashboard.leaper.one;
        proxy_set_header X-Forwarded-Host $host;
        include /etc/nginx/snippets/leaperone-proxy-headers.conf;
    }

    location = /api/device {
        proxy_pass http://127.0.0.1:9821;
        proxy_set_header Host dashboard.leaper.one;
        proxy_set_header X-Forwarded-Host $host;
        include /etc/nginx/snippets/leaperone-proxy-headers.conf;
    }

    location ^~ /api/device/ {
        proxy_pass http://127.0.0.1:9821;
        proxy_set_header Host dashboard.leaper.one;
        proxy_set_header X-Forwarded-Host $host;
        include /etc/nginx/snippets/leaperone-proxy-headers.conf;
    }

    # Browser routes may change origin and therefore use a 302 which preserves
    # the complete path and query string through $request_uri.
    location ~ ^/(dashboard|admin)(/|$) {
        return 302 https://dashboard.leaper.one$request_uri;
    }

    location ~ ^/(signin|signout|device|auth/cli)(/|$) {
        return 302 https://dashboard.leaper.one$request_uri;
    }

    location / {
        proxy_pass http://127.0.0.1:9820;
        proxy_set_header Host $http_host;
        include /etc/nginx/snippets/leaperone-proxy-headers.conf;
        client_max_body_size 20m;
    }
}

