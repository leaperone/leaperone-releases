# LEAPERone Germany direct-origin TLS termination.
# Install to /etc/nginx/sites-enabled/leaperone-local.conf.
#
# Flow:
#   Cloudflare -> Germany Nginx:443 -> 127.0.0.1:9800 -> local Docker web
#   Cloudflare -> Germany Nginx:443 -> 127.0.0.1:9801 -> local Docker api

server {
    listen 443 ssl http2;
    server_name leaper.one www.leaper.one;

    ssl_certificate     /etc/nginx/ssl/leaper.one/fullchain.cer;
    ssl_certificate_key /etc/nginx/ssl/leaper.one/leaper.one.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    include /etc/nginx/snippets/cloudflare-real-ip.conf;
    proxy_buffering off;

    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Upgrade-Insecure-Requests 1;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
        proxy_pass http://127.0.0.1:9800;
        client_max_body_size 20m;
    }
}

server {
    listen 443 ssl http2;
    server_name api.leaper.one;

    ssl_certificate     /etc/nginx/ssl/leaper.one/fullchain.cer;
    ssl_certificate_key /etc/nginx/ssl/leaper.one/leaper.one.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    include /etc/nginx/snippets/cloudflare-real-ip.conf;
    proxy_buffering off;

    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Upgrade-Insecure-Requests 1;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
        proxy_pass http://127.0.0.1:9801;
        client_max_body_size 50m;
    }
}
