name: twosomeone-backend-${DEPLOY_ENV:-production}

services:
  backend:
    image: ${REGISTRY_HOST:-registry.cn-shanghai.aliyuncs.com}/leaperone/2someren:${IMAGE_TAG:-backend-main-latest}
    container_name: twosomeone-backend-${DEPLOY_ENV:-production}
    ports:
      # Host 3003 → container 3001 (host 3001 already occupied by web-beta).
      - "${BACKEND_PORT:-3003}:3001"
    env_file:
      - .env
    # Backend calls web via WEB_BASE_URL — use host-gateway so it reaches
    # the web container's host-published port (LXC 200 host :3000).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
