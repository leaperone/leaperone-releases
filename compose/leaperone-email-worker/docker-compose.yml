name: leaperone-email-worker-${DEPLOY_ENV:-production}

# apps/email-worker is built as a dedicated image. Production deploys the
# source-SHA tag pinned to the registry manifest digest; latest/version tags
# are never deployment inputs.
services:
  email-worker:
    image: ${REGISTRY_HOST:-registry.cn-hongkong.aliyuncs.com}/leaperone/leaperone:${EMAIL_WORKER_IMAGE_TAG:?EMAIL_WORKER_IMAGE_TAG must be email-worker-<source-sha>}@${EMAIL_WORKER_IMAGE_DIGEST:?EMAIL_WORKER_IMAGE_DIGEST must be sha256:<digest>}
    container_name: leaperone-email-worker-${DEPLOY_ENV:-production}
    env_file:
      - .env.worker
    ports:
      - "25:2525/tcp"
    labels:
      com.leaperone.component: email-worker
      com.leaperone.source-sha: ${EMAIL_WORKER_SOURCE_SHA:?EMAIL_WORKER_SOURCE_SHA is required}
      com.leaperone.release-tag: ${EMAIL_WORKER_RELEASE_TAG:?EMAIL_WORKER_RELEASE_TAG is required}
      com.leaperone.releases-sha: ${RELEASES_SHA:?RELEASES_SHA is required}
      com.leaperone.image-digest: ${EMAIL_WORKER_IMAGE_DIGEST:?EMAIL_WORKER_IMAGE_DIGEST is required}
    healthcheck:
      test:
        - CMD
        - deno
        - eval
        - >-
          const connection = await Deno.connect({ hostname: "127.0.0.1", port: 2525 });
          const banner = new Uint8Array(4);
          let offset = 0;
          try {
            while (offset < banner.length) {
              const read = await connection.read(banner.subarray(offset));
              if (read === null) break;
              offset += read;
            }
          } finally {
            connection.close();
          }
          if (new TextDecoder().decode(banner.subarray(0, offset)) !== "220 ") Deno.exit(1);
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 10s
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    cpus: "1.0"
    mem_limit: 1g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

