name: nimei-web-${COLOR:-blue}

services:
  web:
    image: ${DEPLOY_IMAGE_REF:-${REGISTRY_HOST:-registry.cn-hongkong.aliyuncs.com}/leaperone/nimei:${IMAGE_TAG:-latest}}
    env_file:
      - .env
    ports:
      - "127.0.0.1:${WEB_PORT:-9811}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NEXT_PUBLIC_SITE_URL: https://nimei.app
      NEXT_PUBLIC_DOKILOVE_URL: https://doki.love
      SENTRY_DSN: https://ad95f8e28d800b13f55fa2e67e302cb9@sentry.leaperone.cn/7
      SENTRY_ENVIRONMENT: production
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
    labels:
      com.leaperone.source-sha: ${IMAGE_SOURCE_SHA:-}
      com.leaperone.image-digest: ${IMAGE_DIGEST:-}
    networks:
      - leaperone-prod
    restart: unless-stopped

networks:
  leaperone-prod:
    external: true
