# multipost Germany direct-origin TLS termination + blue/green upstream.
# bootstrap 时拷到 /etc/nginx/sites-enabled/multipost-local.conf（被 nginx.conf 的 http{} include）。
#
# 流量路径：
#   Cloudflare -> Germany Nginx:443 -> multipost_web_active -> local Docker web
#
# 路由行为：
#   - multipost.app   → 容器 /     （根）
#   - api.multipost.app → 容器 /api/ （路径重写！api.multipost.app/foo = 容器 /api/foo）
# 蓝绿：deploy-bluegreen.sh 只 sed 改下面 upstream 的端口（9900<->9910）。

upstream multipost_web_active {
    server 127.0.0.1:9900;   # ACTIVE — deploy-bluegreen.sh 在此切换 9900 <-> 9910
}

# ── multipost.app（根路径）──────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name multipost.app;

    ssl_certificate     /etc/nginx/ssl/multipost.app/fullchain.cer;
    ssl_certificate_key /etc/nginx/ssl/multipost.app/multipost.app.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    include /etc/nginx/snippets/cloudflare-real-ip.conf;
    proxy_buffering off;

    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_set_header Upgrade-Insecure-Requests 1;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
        proxy_pass http://multipost_web_active;
        client_max_body_size 20m;
    }
}

# ── api.multipost.app（重写到容器 /api/）─────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.multipost.app;

    ssl_certificate     /etc/nginx/ssl/multipost.app/fullchain.cer;
    ssl_certificate_key /etc/nginx/ssl/multipost.app/multipost.app.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    include /etc/nginx/snippets/cloudflare-real-ip.conf;
    proxy_buffering off;

    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_set_header Upgrade-Insecure-Requests 1;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
        proxy_pass http://multipost_web_active/api/;
        client_max_body_size 20m;
    }
}
