# multipost 源站 TLS 终止 + 蓝绿 upstream（LXC200 / production）。
# bootstrap 时拷到 /etc/nginx/sites-enabled/multipost-local.conf（被 nginx.conf 的 http{} include）。
#
# 流量路径（HK 改为 L4 透传后）：
#   multipost.app / api.multipost.app → CF → HK:443 stream(ssl_preread, 不解密)
#     → map → multipost_origin(127.0.0.1:19900 frps) → 隧道 → LXC200 frpc(localPort 9443)
#     → 本机两个 server(终止 TLS) → proxy_pass 蓝绿 upstream → web 容器
#
# 精确复现原 HK L7 行为：
#   - multipost.app   → 容器 /     （根）
#   - api.multipost.app → 容器 /api/ （路径重写！api.multipost.app/foo = 容器 /api/foo）
# proxy_protocol：HK 443 stream `proxy_protocol on` 透传真实 client IP，本机解析。
# 证书：multipost wildcard（acme.sh + Cloudflare DNS-01，自动续期，同 2some.ren）。
# 蓝绿：deploy-bluegreen.sh 只 sed 改下面 upstream 的端口（9900<->9910）。

upstream multipost_web_active {
    server 127.0.0.1:9900;   # ACTIVE — deploy-bluegreen.sh 在此切换 9900 <-> 9910
}

# ── multipost.app（根路径）──────────────────────────────────────────────
server {
    listen 127.0.0.1:9443 ssl proxy_protocol;
    http2 on;
    server_name multipost.app;

    ssl_certificate     /etc/nginx/ssl/multipost.app/fullchain.cer;
    ssl_certificate_key /etc/nginx/ssl/multipost.app/multipost.app.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    set_real_ip_from 127.0.0.1;
    real_ip_header proxy_protocol;
    proxy_buffering off;

    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_set_header Upgrade-Insecure-Requests 1;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
        proxy_pass http://multipost_web_active;
        client_max_body_size 20m;
    }
}

# ── api.multipost.app（重写到容器 /api/）─────────────────────────────────
server {
    listen 127.0.0.1:9443 ssl proxy_protocol;
    http2 on;
    server_name api.multipost.app;

    ssl_certificate     /etc/nginx/ssl/multipost.app/fullchain.cer;
    ssl_certificate_key /etc/nginx/ssl/multipost.app/multipost.app.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    set_real_ip_from 127.0.0.1;
    real_ip_header proxy_protocol;
    proxy_buffering off;

    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_set_header Upgrade-Insecure-Requests 1;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
        proxy_pass http://multipost_web_active/api/;
        client_max_body_size 20m;
    }
}
