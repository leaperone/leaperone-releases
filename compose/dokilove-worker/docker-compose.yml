name: dokilove-worker-${DEPLOY_ENV:-production}

services:
  worker:
    image: ${REGISTRY_HOST:-registry.cn-hongkong.aliyuncs.com}/leaperone/dokilove:${WORKER_IMAGE_TAG:-worker-latest}
    container_name: dokilove-worker-${DEPLOY_ENV:-production}
    env_file:
      - .env
    extra_hosts:
      # Worker writes image hot objects to the local DE MinIO bound on the host.
      - 'host.docker.internal:host-gateway'
    environment:
      # MissAV is behind Cloudflare; route fetches through FlareSolverr (real Chrome).
      CRAWL_FETCH_MODE: flaresolverr
      FLARESOLVERR_URL: http://flaresolverr:8191
      # Solving the CF challenge over the host tunnel takes ~60-90s; default 60s
      # times out, so allow more headroom.
      FLARESOLVERR_MAX_TIMEOUT_MS: "120000"
      # MissAV runs on its own hourly cron (MISSAV_CRON, default "0 * * * *").
      # FlareSolverr is slow but stable at low parallelism; keep the default
      # conservative and override from .env only after checking failure rates.
      VIDEO_CRAWL_LIMIT: "60"
      MISSAV_CRAWL_CONCURRENCY: "2"
      MISSAV_BACKFILL_RUN_LIMIT: "60"
      MISSAV_BACKFILL_CONCURRENCY: "2"
      # Image rehosting. Hot writes go to DE MinIO; archive copies go to JP Garage.
      # Values come from this project's .env on the target host so compose updates
      # do not carry secrets.
      OSS_HOT_ENDPOINT: ${OSS_HOT_ENDPOINT:-http://host.docker.internal:3900}
      OSS_HOT_KEY_ID: ${OSS_HOT_KEY_ID}
      OSS_HOT_SECRET: ${OSS_HOT_SECRET}
      OSS_HOT_BUCKET: ${OSS_HOT_BUCKET:-media}
      OSS_HOT_REGION: ${OSS_HOT_REGION:-us-east-1}
      OSS_ARCHIVE_ENDPOINT: ${OSS_ARCHIVE_ENDPOINT:-https://lb-jp.leaper.one}
      OSS_ARCHIVE_KEY_ID: ${OSS_ARCHIVE_KEY_ID}
      OSS_ARCHIVE_SECRET: ${OSS_ARCHIVE_SECRET}
      OSS_ARCHIVE_BUCKET: ${OSS_ARCHIVE_BUCKET:-media}
      OSS_ARCHIVE_REGION: ${OSS_ARCHIVE_REGION:-garage}
      OSS_MAX_BYTES: ${OSS_MAX_BYTES:-15728640}
      OSS_REHOST_CONCURRENCY: ${OSS_REHOST_CONCURRENCY:-2}
      OSS_PUT_TIMEOUT_MS: ${OSS_PUT_TIMEOUT_MS:-30000}
      OSS_SOURCE_ALLOWLIST: ${OSS_SOURCE_ALLOWLIST}
      MEDIA_ARCHIVE_CRON: ${MEDIA_ARCHIVE_CRON:-10 */2 * * *}
      MEDIA_ARCHIVE_LIMIT: ${MEDIA_ARCHIVE_LIMIT:-50}
      MEDIA_ARCHIVE_CONCURRENCY: ${MEDIA_ARCHIVE_CONCURRENCY:-1}
      # Legacy JP_OSS_* variables stay for compatibility with older images and scripts.
      JP_OSS_ENDPOINT: ${JP_OSS_ENDPOINT:-https://lb-jp.leaper.one}
      JP_OSS_KEY_ID: ${JP_OSS_KEY_ID}
      JP_OSS_SECRET: ${JP_OSS_SECRET}
      JP_OSS_BUCKET: ${JP_OSS_BUCKET:-media}
      JP_OSS_REGION: ${JP_OSS_REGION:-garage}
      JP_OSS_MAX_BYTES: ${JP_OSS_MAX_BYTES:-10485760}
      JP_OSS_SOURCE_ALLOWLIST: ${JP_OSS_SOURCE_ALLOWLIST}
      OSS_PUBLIC_BASE_URL: ${OSS_PUBLIC_BASE_URL:-https://lb.doki.love}
      CARD_COVER_REHOST_ENABLED: ${CARD_COVER_REHOST_ENABLED:-false}
    ports:
      - '127.0.0.1:${WORKER_PORT:-3100}:3100'
    networks:
      - leaperone-prod
    restart: unless-stopped
    cpus: '2.0'
    mem_limit: 2g
    depends_on:
      - flaresolverr

  flaresolverr:
    # Germany pulls all production images from the Aliyun Hong Kong ACR mirror.
    # Mirror source: ghcr.io/flaresolverr/flaresolverr.
    image: ${REGISTRY_HOST:-registry.cn-hongkong.aliyuncs.com}/leaperone/flaresolverr:${FLARESOLVERR_IMAGE_TAG:-latest}
    container_name: dokilove-flaresolverr-${DEPLOY_ENV:-production}
    environment:
      LOG_LEVEL: info
      TZ: Asia/Shanghai
    networks:
      - leaperone-prod
    restart: unless-stopped
    cpus: '1.5'
    mem_limit: 2g
    # No published ports: only the worker reaches it via the internal compose
    # network (service name `flaresolverr`), so container-to-container traffic
    # never goes through the host.
    #
    # SECURITY / EGRESS: FlareSolverr runs a real Chrome that can issue arbitrary
    # sub-requests the app cannot block. It relies on the PVE host's outbound
    # tunnel to reach missav. If it cannot pass GFW/CF, set PROXY_POOL in this
    # project's .env — the worker forwards that proxy to FlareSolverr per request.
    # For hardening, restrict this service's egress at the host firewall to the
    # outbound proxy + missav hosts only.

networks:
  leaperone-prod:
    external: true
