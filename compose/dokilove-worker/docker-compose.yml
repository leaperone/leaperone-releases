name: dokilove-worker-${DEPLOY_ENV:-production}

services:
  worker:
    image: ${REGISTRY_HOST:-registry.cn-shanghai.aliyuncs.com}/leaperone/dokilove:${WORKER_IMAGE_TAG:-worker-latest}
    container_name: dokilove-worker-${DEPLOY_ENV:-production}
    env_file:
      - .env
    environment:
      # MissAV is behind Cloudflare; route fetches through FlareSolverr (real Chrome).
      CRAWL_FETCH_MODE: flaresolverr
      FLARESOLVERR_URL: http://flaresolverr:8191
      # Solving the CF challenge over the host tunnel takes ~60-90s; default 60s
      # times out, so allow more headroom.
      FLARESOLVERR_MAX_TIMEOUT_MS: "120000"
      # MissAV runs on its own hourly cron (MISSAV_CRON, default "0 * * * *");
      # cap each run to 30 videos so an hour's worth fits the slow CF solving.
      VIDEO_CRAWL_LIMIT: "30"
    ports:
      - '127.0.0.1:${WORKER_PORT:-3100}:3100'
    restart: unless-stopped
    depends_on:
      - flaresolverr

  flaresolverr:
    # ghcr.io is unreachably slow from the PVE host (docker daemon has no tunnel),
    # so pull via the NJU ghcr mirror; image content is identical.
    image: ghcr.nju.edu.cn/flaresolverr/flaresolverr:latest
    container_name: dokilove-flaresolverr-${DEPLOY_ENV:-production}
    environment:
      LOG_LEVEL: info
      TZ: Asia/Shanghai
    restart: unless-stopped
    # No published ports: only the worker reaches it via the internal compose
    # network (service name `flaresolverr`), so container-to-container traffic
    # never goes through the host.
    #
    # SECURITY / EGRESS: FlareSolverr runs a real Chrome that can issue arbitrary
    # sub-requests the app cannot block. It relies on the PVE host's outbound
    # tunnel to reach missav. If it cannot pass GFW/CF, set PROXY_POOL in this
    # project's .env — the worker forwards that proxy to FlareSolverr per request.
    # For hardening, restrict this service's egress at the host firewall to the
    # outbound proxy + missav hosts only.
